                      eff_speed = 0.0 if dist_p <= STOP_DIST else throttle_cmd*2.0
                      rv=torch.tensor([[eff_speed*np.cos(fwd),eff_speed*np.sin(fwd),0.0,0.0,0.0,yaw_rate]],dtype=torch.float32,device="cuda:0")
                      try: robot.write_root_velocity_to_sim(rv)
                      except Exception as ev: print(f"[SIM] vel err: {ev}",flush=True)
                      if _li is not None:
