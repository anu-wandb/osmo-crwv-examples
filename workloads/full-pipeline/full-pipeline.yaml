                  srv._fork_h=float(np.clip(getattr(srv,"_fork_h",-0.10)+lift_cmd*0.06,-0.10,0.45))

                  # ---- DRIVE via root velocity, RE-IMPOSED each substep (overcomes wheel-contact damping);
                  #      physics still resolves collision with the kinematic deck (cannot drive through). ----
                  STOP_DIST=1.1   # forklift center stops this far from pallet center (forks ~1m reach -> under deck)
                  for _sub in range(6):
                      rp=robot.data.root_pos_w[0].detach().cpu().numpy(); rx,ry=float(rp[0]),float(rp[1])
                      pp=pal.data.root_pos_w[0].detach().cpu().numpy(); palx,paly=float(pp[0]),float(pp[1])
                      yaw=_yaw(robot.data.root_quat_w[0].detach().cpu().numpy())
