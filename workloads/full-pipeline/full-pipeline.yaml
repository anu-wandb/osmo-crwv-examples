                              jpos=robot.data.joint_pos.clone(); jpos[0,_li]=srv._fork_h
                              jvel=robot.data.joint_vel.clone(); jvel[0,_li]=0.0
                              robot.write_joint_state_to_sim(jpos,jvel)
                          except Exception: pass
                      ferr=abs(((yaw+np.pi)%(2*np.pi))-np.pi)   # ~0 when forks (face -X) point at the pallet
                      # ENGAGE (earned by driving in + clamped at the pallet): aligned, forks low
                      if (not getattr(srv,"_engaged",False)) and dist_p<1.4 and abs(ry-paly)<0.5 and ferr<0.45 and (srv._fork_h+0.15) < (rest_z+0.06):
