version: 2
default-values:
  max_steps: 6000
  n_episodes: 20
# av-pipeline.yaml — END-TO-END forklift VLA pipeline with PARALLEL base-vs-finetuned eval
#   dataset-preprocess -> cosmos-cap -> vla-finetune -> { base-eval || finetuned-eval } -> compare
# base-eval loads the base GR00T (nvidia/GR00T-N1.6-3B); finetuned-eval loads groot-av-finetuned.
# Eval uses the real-physics sim (collision via kinematic deck + stop-at-pallet clamp, forks-low,
# assisted lift). compare reads both summaries and logs the delta to W&B.
workflow:
  name: av-pipeline
  resources:
    preprocess-gpu:
      platform: gpu
      gpu: 0
      cpu: 16
      memory: 64Gi
      storage: 50Gi
    cap-gpu:
      platform: gpu
      gpu: 2
      cpu: 32
      memory: 128Gi
      storage: 200Gi
    gpu8:
      platform: gpu
      gpu: 8
      cpu: 64
      memory: 384Gi
      storage: 500Gi
    eval-gpu:
      platform: gpu
      gpu: 2
      cpu: 32
      memory: 128Gi
      storage: 200Gi
    compare-cpu:
      platform: gpu
      gpu: 0
      cpu: 8
      memory: 32Gi
      storage: 20Gi

  groups:
  - name: dataset-preprocess-group
    tasks:
    - name: preprocess
      lead: true
      resource: preprocess-gpu
      image: nvcr.io/nvidia/pytorch:25.05-py3
      command: [bash]
      args: [/scripts/run.sh]
      credentials:
        workflow-secrets:
          WANDB_API_KEY: WANDB_API_KEY
          WANDB_ENTITY: WANDB_ENTITY
      files:

      - path: /scripts/preprocess.py
        contents: |
          """Convert tduggan93/forklift -> GR00T-compliant LeRobot v2.1 dataset."""
          import os, sys, io, json, time
          from pathlib import Path
          import numpy as np
          import pandas as pd
          from PIL import Image
          import imageio
          import wandb
          from huggingface_hub import snapshot_download

          OUT_DIR = Path(os.environ["OUT_DIR"])
          FPS     = int(os.environ.get("FPS_OUT", "10"))
          H = int(os.environ.get("HEIGHT", "448")); W = int(os.environ.get("WIDTH", "448"))
          DATASET = os.environ.get("HF_DATASET", "tduggan93/forklift")
          CHUNK = 1000

          TASK_LANG = {
              0: "engage the forklift forks under the pallet on the ground",
              1: "place the loaded pallet into the slot on the ground",
              2: "place the loaded pallet into the slot on the truck",
              3: "engage the forklift forks under the pallet on the truck",
          }
          ACTION_CONTRACT = {"ACTION_STEER": 0, "ACTION_THROTTLE": 1, "ACTION_LIFT": 2, "dim": 3,
              "ranges": {"steer": [-0.43, 0.43], "throttle": [-0.40, 0.60], "lift": [0.0, 0.239]},
              "source_dataset": DATASET,
              "map": ["steer<-src[1]", "throttle<-src[0]/drive", "lift<-src[2]"],
              "dropped": ["shift=src[3]", "tilt=src[4]"]}

          STATE_NAMES = ["lift_joint","shift_joint","steering_angle","steering_rate",
                         "wheel_velocity","tilt_angle","pallet_dx","pallet_dy","pallet_dyaw"]

          def decode_image(x):
              if isinstance(x, dict): x = x.get("bytes") or x.get("path")
              if isinstance(x, (bytes, bytearray)): return Image.open(io.BytesIO(bytes(x))).convert("RGB")
              if isinstance(x, np.ndarray): return Image.fromarray(x.astype(np.uint8))
              return Image.open(x).convert("RGB")
          def map_action(src):  return [float(src[1]), float(src[0]), float(src[2])]   # steer, throttle, lift
          def build_state(st, pdelta): return [float(v) for v in st] + [float(v) for v in pdelta]

          print(f"[pre] downloading {DATASET} ...", flush=True)
          t0 = time.time()
          repo = Path(snapshot_download(repo_id=DATASET, repo_type="dataset"))
          pfs = sorted(repo.rglob("*.parquet"))
          df = pd.concat([pd.read_parquet(p) for p in pfs], ignore_index=True)
          print(f"[pre] {len(df)} rows; cols={list(df.columns)} ({time.time()-t0:.1f}s)", flush=True)
          img_col = next(c for c in df.columns if "image" in c.lower())
          act_col = next(c for c in df.columns if "action" in c.lower())
          st_col  = next(c for c in df.columns if c == "state")
          pd_col  = next(c for c in df.columns if "pallet" in c.lower() and "valid" not in c.lower())
          ti_col  = next(c for c in df.columns if "task" in c.lower())
          ep_col  = next(c for c in df.columns if "episode" in c.lower())
          fr_col  = next(c for c in df.columns if "frame" in c.lower())

          data_dir = OUT_DIR / "data" / "chunk-000"; data_dir.mkdir(parents=True, exist_ok=True)
          vid_dir  = OUT_DIR / "videos" / "chunk-000" / "observation.images.front_camera"; vid_dir.mkdir(parents=True, exist_ok=True)
          meta_dir = OUT_DIR / "meta"; meta_dir.mkdir(parents=True, exist_ok=True)

          run = wandb.init(entity=os.environ.get("WANDB_ENTITY"),
              project=os.environ.get("WANDB_PROJECT", "osmo-workflow"),
              name=f"dataset-preprocess-{time.strftime('%m%d-%H%M')}",
              job_type="dataset-preprocess", tags=["dataset-preprocess", "forklift", "lerobot-v2.1"],
              config={"source": DATASET, "fps": FPS, "resolution": f"{H}x{W}"})

          episodes = {int(e): g.sort_values(fr_col).reset_index(drop=True) for e, g in df.groupby(ep_col)}
          ep_ids = sorted(episodes)
          print(f"[pre] {len(ep_ids)} episodes", flush=True)

          global_index = 0
          total_frames = 0
          episodes_meta = []
          task_counts = {0: 0, 1: 0, 2: 0, 3: 0}
          all_state, all_action = [], []
          img_samples = []
          sample_logged = set()

          for ep in ep_ids:
              g = episodes[ep]
              task_idx = int(g.iloc[0][ti_col]); task_counts[task_idx] = task_counts.get(task_idx, 0) + 1
              frames, rows = [], []
              for fi in range(len(g)):
                  row = g.iloc[fi]
                  arr = np.array(decode_image(row[img_col]).resize((W, H), Image.LANCZOS))
                  frames.append(arr)
                  if global_index % 50 == 0: img_samples.append(arr)
                  state = build_state(list(row[st_col]), list(row[pd_col]))
                  action = map_action(row[act_col])
                  all_state.append(state); all_action.append(action)
                  rows.append({"observation.state": np.asarray(state, dtype=np.float32),
                               "action": np.asarray(action, dtype=np.float32),
                               "timestamp": np.float32(fi / FPS), "frame_index": np.int64(fi),
                               "episode_index": np.int64(ep), "index": np.int64(global_index),
                               "task_index": np.int64(task_idx)})
                  global_index += 1
              imageio.mimsave(str(vid_dir / f"episode_{ep:06d}.mp4"), frames, fps=FPS, quality=8)
              pd.DataFrame(rows).to_parquet(str(data_dir / f"episode_{ep:06d}.parquet"), index=False)
              episodes_meta.append({"episode_index": ep, "tasks": [TASK_LANG[task_idx]], "length": len(rows)})
              total_frames += len(rows)
              # log one sample video per task type
              if task_idx not in sample_logged:
                  run.log({f"sample_task_{task_idx}": wandb.Video(str(vid_dir / f"episode_{ep:06d}.mp4"),
                           fps=FPS, format="mp4", caption=TASK_LANG[task_idx])})
                  sample_logged.add(task_idx)
              if ep % 25 == 0: print(f"[pre] ep {ep}/{len(ep_ids)} (task={task_idx}, {len(rows)} frames)", flush=True)

          N = len(episodes_meta)
          state_arr = np.asarray(all_state, dtype=np.float32)
          action_arr = np.asarray(all_action, dtype=np.float32)

          def feat_stats(a):
              return {"mean": a.mean(0).tolist(), "std": (a.std(0) + 1e-8).tolist(),
                      "min": a.min(0).tolist(), "max": a.max(0).tolist(),
                      "q01": np.quantile(a, 0.01, 0).tolist(), "q99": np.quantile(a, 0.99, 0).tolist()}

          # image stats (per channel, normalized 0-1) from subsample
          imgs = np.stack(img_samples).astype(np.float32) / 255.0   # (n,H,W,3)
          img_mean = imgs.mean(axis=(0,1,2)).tolist(); img_std = (imgs.std(axis=(0,1,2)) + 1e-8).tolist()
          def chan(v): return [[[c]] for c in v]   # shape (3,1,1) per LeRobot image-stats convention

          # ---- meta/info.json ----
          info = {
              "codebase_version": "v2.1", "robot_type": "forklift",
              "total_episodes": N, "total_frames": total_frames,
              "total_tasks": len(TASK_LANG), "total_videos": N, "total_chunks": 1, "chunks_size": CHUNK,
              "fps": FPS, "splits": {"train": f"0:{N}"},
              "data_path": "data/chunk-{episode_chunk:03d}/episode_{episode_index:06d}.parquet",
              "video_path": "videos/chunk-{episode_chunk:03d}/{video_key}/episode_{episode_index:06d}.mp4",
              "features": {
                  "observation.images.front_camera": {"dtype": "video", "shape": [H, W, 3],
                      "names": ["height", "width", "channel"],
                      "info": {"video.fps": float(FPS), "video.codec": "h264",
                               "video.height": H, "video.width": W, "video.channels": 3}},
                  "observation.state": {"dtype": "float32", "shape": [9], "names": STATE_NAMES},
                  "action": {"dtype": "float32", "shape": [3], "names": ["steer", "throttle", "lift"]},
                  "timestamp": {"dtype": "float32", "shape": [1]},
                  "frame_index": {"dtype": "int64", "shape": [1]},
                  "episode_index": {"dtype": "int64", "shape": [1]},
                  "index": {"dtype": "int64", "shape": [1]},
                  "task_index": {"dtype": "int64", "shape": [1]},
              },
          }
          (meta_dir / "info.json").write_text(json.dumps(info, indent=2))

          # ---- meta/tasks.jsonl ----
          (meta_dir / "tasks.jsonl").write_text(
              "\n".join(json.dumps({"task_index": k, "task": v}) for k, v in sorted(TASK_LANG.items())))
          # ---- meta/episodes.jsonl ----
          (meta_dir / "episodes.jsonl").write_text(
              "\n".join(json.dumps(e) for e in episodes_meta))
          # ---- meta/modality.json ----
          (meta_dir / "modality.json").write_text(json.dumps({
              "state": {"vehicle_state": {"start": 0, "end": 9}},
              "action": {"vehicle_control": {"start": 0, "end": 3}},
              "video": {"front_camera": {"original_key": "observation.images.front_camera"}},
              "annotation": {"human.task_description": {"original_key": "task_index"}},
          }, indent=2))
          # ---- meta/stats.json ----
          (meta_dir / "stats.json").write_text(json.dumps({
              "observation.state": feat_stats(state_arr),
              "action": feat_stats(action_arr),
              "observation.images.front_camera": {"mean": chan(img_mean), "std": chan(img_std),
                  "min": chan([0.0,0.0,0.0]), "max": chan([1.0,1.0,1.0])},
          }, indent=2))
          (OUT_DIR / "action_contract.json").write_text(json.dumps(ACTION_CONTRACT, indent=2))

          # ---- validation ----
          print("\n==== VALIDATION ====", flush=True)
          th_std = float(action_arr[:, 1].std()); lift_frac = float((action_arr[:, 2] > 0.01).mean())
          n_parquet = len(list(data_dir.glob("*.parquet"))); n_mp4 = len(list(vid_dir.glob("*.mp4")))
          print(f"  episodes:        {N} | parquets={n_parquet} mp4s={n_mp4} | {'PASS' if N==n_parquet==n_mp4 else 'FAIL'}", flush=True)
          print(f"  THROTTLE std:    {th_std:.4f} | >0.1 | {'PASS' if th_std>0.1 else 'FAIL'}", flush=True)
          print(f"  LIFT frac:       {lift_frac:.4f} | >0.1 | {'PASS' if lift_frac>0.1 else 'FAIL'}", flush=True)
          print(f"  state dim/action dim: {state_arr.shape[1]}/{action_arr.shape[1]} (expect 9/3)", flush=True)
          print(f"  task_counts:     {task_counts}", flush=True)
          print(f"  features keys:   {list(info['features'].keys())}", flush=True)
          print("====================\n", flush=True)

          run.summary.update({"n_episodes": N, "n_frames": total_frames,
              "throttle_std": round(th_std, 4), "lift_frac_active": round(lift_frac, 4),
              "task_counts": {f"task_{k}": v for k, v in task_counts.items()}})
          tbl = wandb.Table(columns=["channel","mean","std","min","max"],
              data=[[n, round(float(action_arr[:,i].mean()),4), round(float(action_arr[:,i].std()),4),
                     round(float(action_arr[:,i].min()),4), round(float(action_arr[:,i].max()),4)]
                    for i,n in enumerate(["steer","throttle","lift"])])
          run.log({"action_channel_stats": tbl})

          art = wandb.Artifact("av-forklift-v1", type="dataset",
              description=f"tduggan93/forklift -> GR00T LeRobot v2.1 ({N} episodes)",
              metadata={"source": DATASET, "n_episodes": N, "n_frames": total_frames,
                        "format": "lerobot-v2.1", "action_dim": 3, "state_dim": 9})
          art.add_dir(str(OUT_DIR), name="dataset")
          run.log_artifact(art).wait()
          run.finish()
          print(f"[pre] Done in {time.time()-t0:.0f}s — artifact av-forklift-v1 ({N} eps, {total_frames} frames)", flush=True)

      - path: /scripts/run.sh
        contents: |
          #!/usr/bin/env bash
          set -euo pipefail
          export WANDB_PROJECT="${WANDB_PROJECT:-osmo-workflow}"
          export HF_DATASET="${HF_DATASET:-tduggan93/forklift}"
          export FPS_OUT="${FPS_OUT:-10}" HEIGHT="${HEIGHT:-448}" WIDTH="${WIDTH:-448}"
          export OUT_DIR="{{output}}/dataset"
          mkdir -p "${OUT_DIR}"

          echo "=== dataset-preprocess: tduggan93/forklift -> GR00T LeRobot v2.1 ==="
          python3 --version; nvidia-smi -L 2>/dev/null | head -2 || true

          apt-get update -y >/dev/null 2>&1 || true
          apt-get install -y --no-install-recommends git ffmpeg ca-certificates curl >/dev/null 2>&1 || true
          pip install --no-cache-dir --quiet \
            huggingface_hub pandas==2.2.3 pyarrow==17.0.0 \
            Pillow imageio imageio-ffmpeg numpy wandb==0.25.0

          python3 /scripts/preprocess.py 2>&1 | tee "{{output}}/preprocess.log"

          echo "=== sanity: output tree ==="
          find "${OUT_DIR}/meta" -maxdepth 1 -type f | sort
          ls "${OUT_DIR}/data/chunk-000" | head -3
          echo "=== dataset-preprocess DONE ==="
  - name: cosmos-cap-group
    tasks:
    - name: cosmos-cap
      lead: true
      resource: cap-gpu
      inputs:
      - task: preprocess
      image: nvcr.io/nvidia/pytorch:25.05-py3
      command: [bash]
      args: [/scripts/run.sh]
      credentials:
        workflow-secrets:
          HF_TOKEN: HF_TOKEN
          WANDB_API_KEY: WANDB_API_KEY
          WANDB_ENTITY: WANDB_ENTITY
      files:

      - path: /scripts/cap.py
        contents: |
          """Cosmos3-Nano Reasoner captioning over a GR00T LeRobot v2.1 dataset.

          Reads per-episode parquets + mp4s, captions each clip, filters by score, then
          re-emits a GR00T-compliant dataset where each kept episode's caption is its own
          task (unique task_index). Renumbers episodes/tasks 0..K-1.
          """
          import os, sys, io, json, time, re, shutil
          from pathlib import Path
          import numpy as np
          import pandas as pd
          import wandb

          IN_DIR     = Path(os.environ["IN_DIR"])
          OUT_DIR    = Path(os.environ["OUT_DIR"])
          REASON_URL = os.environ.get("REASON_URL", "http://127.0.0.1:8000")
          MIN_SCORE  = int(os.environ.get("MIN_SCORE", "3"))
          MAX_EPISODES = int(os.environ.get("MAX_EPISODES", "0"))

          PROMPT = (
              "You are analyzing a first-person forklift operation video clip in a warehouse.\n"
              "Respond in EXACTLY this format, nothing else:\n"
              "DESCRIPTION: <one sentence, max 20 words, describing the specific forklift action>\n"
              "PHASE: <one of: navigate | align | insert | lift | deliver>\n"
              "SCORE: <integer 1-5, where 5=physically realistic smooth motion, 3=acceptable, 1=reject>\n"
              "REASONING: <one short sentence>\n"
          )

          def parse_response(text):
              o = {"description": None, "phase": None, "score": None}
              for ln in text.strip().splitlines():
                  u = ln.strip()
                  if u.upper().startswith("DESCRIPTION:"): o["description"] = u.split(":", 1)[1].strip()
                  elif u.upper().startswith("PHASE:"):      o["phase"] = u.split(":", 1)[1].strip().lower()
                  elif u.upper().startswith("SCORE:"):
                      m = re.search(r"[1-5]", u.split(":", 1)[1]); o["score"] = int(m.group()) if m else None
              return o

          # ---- connect to Reasoner ----
          use_reasoner, client, model_id = False, None, None
          try:
              import openai
              client = openai.OpenAI(api_key="EMPTY", base_url=f"{REASON_URL}/v1")
              model_id = client.models.list().data[0].id
              use_reasoner = True
              print(f"[cap] Reasoner online: {model_id}", flush=True)
          except Exception as e:
              print(f"[cap] Reasoner NOT available ({e}); fallback to existing captions", flush=True)

          def caption_video(mp4):
              try:
                  resp = client.chat.completions.create(model=model_id, max_tokens=256, temperature=0.2, seed=0,
                      messages=[{"role": "user", "content": [
                          {"type": "video_url", "video_url": {"url": mp4.resolve().as_uri()}},
                          {"type": "text", "text": PROMPT}]}])
                  return parse_response(resp.choices[0].message.content)
              except Exception as e:
                  print(f"[cap] call failed {mp4.name}: {e}", flush=True); return None

          # ---- load source GR00T dataset meta ----
          src_meta = IN_DIR / "meta"
          info = json.loads((src_meta / "info.json").read_text())
          modality = json.loads((src_meta / "modality.json").read_text())
          episodes_meta = [json.loads(l) for l in (src_meta / "episodes.jsonl").read_text().splitlines() if l.strip()]
          action_contract = json.loads((IN_DIR / "action_contract.json").read_text()) if (IN_DIR / "action_contract.json").exists() else {}
          ep_lang = {e["episode_index"]: (e.get("tasks", [""]) or [""])[0] for e in episodes_meta}
          ep_ids = sorted(e["episode_index"] for e in episodes_meta)
          if MAX_EPISODES > 0:
              ep_ids = ep_ids[:MAX_EPISODES]
              print(f"[cap] SMOKE: capped to first {MAX_EPISODES} episodes", flush=True)
          print(f"[cap] {len(ep_ids)} episodes", flush=True)

          src_data = IN_DIR / "data" / "chunk-000"
          src_vid  = IN_DIR / "videos" / "chunk-000" / "observation.images.front_camera"

          run = wandb.init(entity=os.environ.get("WANDB_ENTITY"),
              project=os.environ.get("WANDB_PROJECT", "osmo-workflow"),
              name=f"cosmos-cap-{time.strftime('%m%d-%H%M')}",
              job_type="cosmos-cap", tags=["cosmos-cap", "cosmos3", "reasoner"],
              config={"use_reasoner": use_reasoner, "min_score": MIN_SCORE, "n_input": len(ep_ids),
                      "source_artifact": os.environ.get("WANDB_INPUT_ARTIFACT", "")})

          # record the upstream dataset as a W&B input so the lineage edge shows (av-forklift-v1 -> cosmos-cap)
          try:
              run.use_artifact(os.environ.get("WANDB_INPUT_ARTIFACT") or "av-forklift-v1:latest", type="dataset")
          except Exception as _e:
              print(f"[cap] use_artifact lineage note: {_e}", flush=True)

          # ---- caption + score each episode ----
          records, kept = [], []   # kept: list of (src_ep, caption)
          for ep in ep_ids:
              mp4 = src_vid / f"episode_{ep:06d}.mp4"
              caption = ep_lang.get(ep, "operate the forklift"); score = 4
              if use_reasoner and mp4.exists():
                  r = caption_video(mp4)
                  if r and r["score"] is not None:
                      score = r["score"]; caption = r["description"] or caption
                      print(f"[cap] ep {ep}: score={score} | {caption[:60]}", flush=True)
              keep = score >= MIN_SCORE
              records.append({"src_episode": int(ep), "score": score, "caption": caption, "kept": keep})
              if keep: kept.append((ep, caption))

          if not kept:
              print(f"[cap] WARN: all filtered (min={MIN_SCORE}); keeping all", flush=True)
              kept = [(ep, ep_lang.get(ep, "operate the forklift")) for ep in ep_ids]
              for r in records: r["kept"] = True

          # ---- re-emit GR00T-compliant dataset, renumbered 0..K-1, per-episode tasks ----
          out_data = OUT_DIR / "data" / "chunk-000"; out_data.mkdir(parents=True, exist_ok=True)
          out_vid  = OUT_DIR / "videos" / "chunk-000" / "observation.images.front_camera"; out_vid.mkdir(parents=True, exist_ok=True)
          out_meta = OUT_DIR / "meta"; out_meta.mkdir(parents=True, exist_ok=True)

          new_tasks, new_eps = [], []
          gi, total_frames = 0, 0
          all_state, all_action = [], []
          for new_idx, (src_ep, caption) in enumerate(kept):
              dfp = pd.read_parquet(src_data / f"episode_{src_ep:06d}.parquet")
              n = len(dfp)
              dfp["episode_index"] = np.int64(new_idx)
              dfp["task_index"] = np.int64(new_idx)
              dfp["index"] = np.arange(gi, gi + n, dtype=np.int64)
              gi += n; total_frames += n
              dfp.to_parquet(str(out_data / f"episode_{new_idx:06d}.parquet"), index=False)
              shutil.copy2(str(src_vid / f"episode_{src_ep:06d}.mp4"), str(out_vid / f"episode_{new_idx:06d}.mp4"))
              new_tasks.append({"task_index": new_idx, "task": caption})
              new_eps.append({"episode_index": new_idx, "tasks": [caption], "length": n})
              all_state.append(np.stack(dfp["observation.state"].apply(lambda x: np.asarray(x, np.float32)).values))
              all_action.append(np.stack(dfp["action"].apply(lambda x: np.asarray(x, np.float32)).values))

          K = len(kept)
          info["total_episodes"] = K; info["total_frames"] = total_frames
          info["total_tasks"] = K; info["total_videos"] = K; info["splits"] = {"train": f"0:{K}"}
          (out_meta / "info.json").write_text(json.dumps(info, indent=2))
          (out_meta / "tasks.jsonl").write_text("\n".join(json.dumps(t) for t in new_tasks))
          (out_meta / "episodes.jsonl").write_text("\n".join(json.dumps(e) for e in new_eps))
          (out_meta / "modality.json").write_text(json.dumps(modality, indent=2))
          if action_contract: (OUT_DIR / "action_contract.json").write_text(json.dumps(action_contract, indent=2))

          state_arr = np.concatenate(all_state); action_arr = np.concatenate(all_action)
          def fs(a): return {"mean": a.mean(0).tolist(), "std": (a.std(0)+1e-8).tolist(),
              "min": a.min(0).tolist(), "max": a.max(0).tolist(),
              "q01": np.quantile(a,0.01,0).tolist(), "q99": np.quantile(a,0.99,0).tolist()}
          src_stats = json.loads((src_meta/"stats.json").read_text()) if (src_meta/"stats.json").exists() else {}
          stats = {"observation.state": fs(state_arr), "action": fs(action_arr)}
          if "observation.images.front_camera" in src_stats:
              stats["observation.images.front_camera"] = src_stats["observation.images.front_camera"]
          (out_meta / "stats.json").write_text(json.dumps(stats, indent=2))
          (out_meta / "caption_records.jsonl").write_text("\n".join(json.dumps(r) for r in records))

          # ---- validation + W&B ----
          scores = [r["score"] for r in records]
          n_pq = len(list(out_data.glob("*.parquet"))); n_mp4 = len(list(out_vid.glob("*.mp4")))
          print("\n==== VALIDATION ====", flush=True)
          print(f"  use_reasoner:  {use_reasoner} | {'PASS' if use_reasoner else 'FALLBACK'}", flush=True)
          print(f"  kept:          {K}/{len(ep_ids)} | parquets={n_pq} mp4s={n_mp4} | {'PASS' if K==n_pq==n_mp4 else 'FAIL'}", flush=True)
          print(f"  mean score:    {round(float(np.mean(scores)),2)}", flush=True)
          print(f"  unique tasks:  {len(new_tasks)} (per-episode captions)", flush=True)
          print("====================\n", flush=True)

          tbl = wandb.Table(columns=["src_episode","score","caption","kept"],
              data=[[r["src_episode"], r["score"], r["caption"][:70], r["kept"]] for r in records])
          run.log({"caption_quality_table": tbl})
          run.summary.update({"n_input": len(ep_ids), "n_output": K, "n_filtered": len(ep_ids)-K,
              "mean_score": round(float(np.mean(scores)),2), "use_reasoner": use_reasoner})

          art = wandb.Artifact("av-cosmos-cap-v1", type="dataset",
              description=f"Cosmos3-Nano Reasoner captioned forklift dataset ({K} eps, GR00T v2.1)",
              metadata={"n_episodes": K, "source": "av-forklift-v1", "use_reasoner": use_reasoner})
          art.add_dir(str(OUT_DIR), name="dataset")
          run.log_artifact(art).wait()
          run.finish()
          print(f"[cap] Done — av-cosmos-cap-v1 ({K} eps, reasoner={use_reasoner})", flush=True)

      - path: /scripts/run.sh
        contents: |
          #!/usr/bin/env bash
          set -euo pipefail
          export WANDB_PROJECT="${WANDB_PROJECT:-osmo-workflow}"
          export WANDB_INPUT_ARTIFACT="${WANDB_INPUT_ARTIFACT:-wandb-smle/osmo-workflow/av-forklift-v1:latest}"
          export MIN_SCORE="${MIN_SCORE:-3}"
          export MAX_EPISODES="${MAX_EPISODES:-0}"
          export REASON_PORT="${REASON_PORT:-8000}"
          export REASON_URL="http://127.0.0.1:${REASON_PORT}"
          export COSMOS_MODEL="${COSMOS_MODEL:-nvidia/Cosmos3-Nano}"
          export IN_DIR="/workspace/forklift_dataset/dataset"
          export OUT_DIR="{{output}}/dataset"
          mkdir -p "/workspace/forklift_dataset" "${OUT_DIR}"

          echo "=== cosmos-cap: Cosmos3-Nano Reasoner captioning ==="
          nvidia-smi -L | head -4
          apt-get update -y >/dev/null 2>&1 || true
          apt-get install -y --no-install-recommends git ffmpeg ca-certificates curl >/dev/null 2>&1 || true

          if [[ -n "${HF_TOKEN:-}" ]]; then
            pip install --quiet --no-cache-dir huggingface_hub 2>&1 | tail -1 || true
            python3 -c "from huggingface_hub import login; login('${HF_TOKEN}')" 2>/dev/null && echo "[hf] logged in" || true
          fi

          # fresh uv venv for vLLM Reasoner (cu128 for Blackwell sm_120)
          echo "[vllm] installing uv + vllm + vllm-cosmos3 ..."
          pip install --quiet --no-cache-dir uv 2>&1 | tail -1 || true
          export VENV=/opt/cosmos-venv
          uv venv --python 3.13 --seed "${VENV}"
          source "${VENV}/bin/activate"
          uv pip install --torch-backend=cu128 "vllm==0.19.1" \
            "vllm-cosmos3 @ git+https://github.com/NVIDIA/cosmos-framework.git#subdirectory=packages/vllm-cosmos3" \
            openai pandas pyarrow imageio imageio-ffmpeg Pillow "wandb==0.25.0" huggingface_hub 2>&1 | tail -15

          echo "[vllm] starting Cosmos3-Nano Reasoner on :${REASON_PORT} ..."
          CUDA_VISIBLE_DEVICES=0 HF_HUB_ENABLE_HF_TRANSFER=1 \
          vllm serve "${COSMOS_MODEL}" \
            --hf-overrides '{"architectures": ["Cosmos3ReasonerForConditionalGeneration"]}' \
            --tensor-parallel-size 1 --mm-encoder-tp-mode data --async-scheduling \
            --allowed-local-media-path / --media-io-kwargs '{"video": {"num_frames": -1}}' \
            --port "${REASON_PORT}" > /workspace/vllm_server.log 2>&1 &
          VLLM_PID=$!
          echo "[vllm] PID=${VLLM_PID}; waiting for readiness ..."
          READY=0
          for i in $(seq 1 240); do
            if curl -sf "http://127.0.0.1:${REASON_PORT}/v1/models" >/dev/null 2>&1; then
              echo "[vllm] ready after ~$((i*10))s"; READY=1; break; fi
            if ! kill -0 ${VLLM_PID} 2>/dev/null; then echo "[vllm] died:"; tail -n 40 /workspace/vllm_server.log; break; fi
            sleep 10
          done
          [[ "${READY}" != "1" ]] && { echo "[vllm] NOT ready -> fallback captions"; tail -n 20 /workspace/vllm_server.log 2>/dev/null || true; }

          echo "[data] downloading ${WANDB_INPUT_ARTIFACT} ..."
          python - <<'PY'
          import os, wandb
          api = wandb.Api()
          api.artifact(os.environ["WANDB_INPUT_ARTIFACT"], type="dataset").download(root="/workspace/forklift_dataset")
          print("[data] download complete")
          PY

          echo "[cap] running captioning (MAX_EPISODES=${MAX_EPISODES}, MIN_SCORE=${MIN_SCORE}) ..."
          python /scripts/cap.py 2>&1 | tee "{{output}}/cap.log"
          kill ${VLLM_PID} 2>/dev/null || true
          echo "=== cosmos-cap DONE ==="
  - name: vla-finetune-group
    tasks:
    - name: groot-finetune
      lead: true
      resource: gpu8
      inputs:
      - task: cosmos-cap
      image: nvcr.io/nvidia/pytorch:25.05-py3
      command: [bash]
      args: [/scripts/run.sh]
      credentials:
        workflow-secrets:
          HF_TOKEN: HF_TOKEN
          WANDB_API_KEY: WANDB_API_KEY
          WANDB_ENTITY: WANDB_ENTITY
      files:
      - path: /scripts/av_vehicle_config.py
        contents: |
          from gr00t.configs.data.embodiment_configs import register_modality_config
          from gr00t.data.embodiment_tags import EmbodimentTag
          from gr00t.data.types import (
              ActionConfig, ActionFormat, ActionRepresentation, ActionType, ModalityConfig)
          av_vehicle_config = {
              "video":    ModalityConfig(delta_indices=[0], modality_keys=["front_camera"]),
              "state":    ModalityConfig(delta_indices=[0], modality_keys=["vehicle_state"]),
              "action":   ModalityConfig(
                  delta_indices=list(range(16)),
                  modality_keys=["vehicle_control"],
                  action_configs=[ActionConfig(rep=ActionRepresentation.ABSOLUTE,
                      type=ActionType.NON_EEF, format=ActionFormat.DEFAULT)]),
              "language": ModalityConfig(delta_indices=[0],
                  modality_keys=["annotation.human.task_description"]),
          }
          register_modality_config(av_vehicle_config, embodiment_tag=EmbodimentTag.NEW_EMBODIMENT)
      - path: /scripts/run.sh
        contents: |
          #!/usr/bin/env bash
          set -euo pipefail

          export BASE_MODEL="${BASE_MODEL:-nvidia/GR00T-N1.6-3B}"
          export EMBODIMENT_TAG="${EMBODIMENT_TAG:-NEW_EMBODIMENT}"
          export MAX_STEPS="{{ max_steps }}"
          export LEARNING_RATE="${LEARNING_RATE:-5e-5}"
          export GRAD_ACCUM="${GRAD_ACCUM:-2}"
          export SAVE_STEPS="${SAVE_STEPS:-2000}"
          export GLOBAL_BATCH_SIZE="${GLOBAL_BATCH_SIZE:-8}"
          export WANDB_PROJECT="${WANDB_PROJECT:-osmo-workflow}"
          export WANDB_DATASET_ARTIFACT="${WANDB_DATASET_ARTIFACT:-wandb-smle/osmo-workflow/av-cosmos-cap-v1:latest}"
          export DATASET_ROOT="/workspace/dataset_raw/dataset"
          export OUT="{{output}}"
          mkdir -p "${OUT}/checkpoint-final"

          export NCCL_P2P_DISABLE=1
          export NCCL_IB_DISABLE=1
          export NCCL_DEBUG=WARN
          export TORCH_NCCL_BLOCKING_WAIT=1
          export PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

          echo "=== vla-finetune: GR00T on NGC PyTorch 25.05 ==="
          nvidia-smi -L | head -10
          NGPU=$(nvidia-smi -L | wc -l)
          echo "GPUs=${NGPU}  BATCH=${GLOBAL_BATCH_SIZE}  GRAD_ACCUM=${GRAD_ACCUM}  STEPS=${MAX_STEPS}"

          apt-get update -y >/dev/null 2>&1 || true
          apt-get install -y --no-install-recommends git ffmpeg ca-certificates curl >/dev/null 2>&1 || true

          pip install --no-cache-dir \
            wandb==0.25.0 \
            transformers==4.51.3 accelerate safetensors==0.4.5 \
            albumentations==1.4.18 diffusers==0.35.1 dm-tree==0.1.8 \
            datasets==3.6.0 peft==0.17.1 msgpack==1.1.0 msgpack-numpy==0.4.8 \
            omegaconf==2.3.0 tyro==0.9.17 \
            einops scipy termcolor lmdb av pyzmq click \
            huggingface_hub pyarrow decord opencv-python-headless
          pip install --no-cache-dir --no-deps "torchcodec==0.4.0" 2>&1 | tail -3 || true

          # Flash-attn smoke-test
          python - <<'PY' || true
          import importlib, torch
          try:
              fa = importlib.import_module("flash_attn")
              q = torch.randn(1, 4, 8, 16, device="cuda", dtype=torch.bfloat16)
              fa.flash_attn_func(q, q, q)
              print(f"[flash-attn] OK version={getattr(fa,'__version__','?')}")
          except Exception as e:
              print(f"[flash-attn] unusable: {e}")
              import os; os.environ.setdefault("TRANSFORMERS_ATTENTION_IMPLEMENTATION","eager")
          PY

          # Download dataset from W&B artifact (lands at /workspace/dataset_raw/dataset/)
          echo "[data] downloading ${WANDB_DATASET_ARTIFACT}"
          python - <<'PY'
          import os, wandb
          api = wandb.Api()
          art = api.artifact(os.environ["WANDB_DATASET_ARTIFACT"], type="dataset")
          art.download(root="/workspace/dataset_raw")
          print(f"[data] downloaded; DATASET_ROOT={os.environ['DATASET_ROOT']}")
          import pathlib
          p = pathlib.Path(os.environ["DATASET_ROOT"])
          for f in sorted(p.rglob("*"))[:15]: print(f" {f}")
          PY

          # Clone + install Isaac-GR00T
          if [[ ! -d /workspace/Isaac-GR00T ]]; then
            git clone --depth 1 --branch n1.6-release https://github.com/NVIDIA/Isaac-GR00T /workspace/Isaac-GR00T
          fi
          pip install --no-deps -e /workspace/Isaac-GR00T
          export PYTHONPATH="/workspace/Isaac-GR00T${PYTHONPATH:+:${PYTHONPATH}}"

          # Patches: wandb project, device shim, DDP, grad-ckpt
          python - <<'PY'
          from pathlib import Path
          for f in Path("/workspace/Isaac-GR00T/gr00t").rglob("*.py"):
              try: c = f.read_text()
              except Exception: continue
              c2 = c.replace('"finetune-gr00t-n1d6"',
                  '__import__("os").environ.get("WANDB_PROJECT","osmo-workflow")')
              if c2 != c: f.write_text(c2); print(f"[patch] wandb_project: {f}")
          shim = (
            "import os as _os, torch as _torch\n"
            "if _torch.cuda.is_available():\n"
            "    _lr = int(_os.environ.get('LOCAL_RANK',_os.environ.get('OMPI_COMM_WORLD_LOCAL_RANK',0)))\n"
            "    _torch.cuda.set_device(_lr)\n"
            "    print(f'[device-shim] rank pinned to cuda:{_lr}', flush=True)\n"
          )
          p = Path("/workspace/Isaac-GR00T/gr00t/experiment/launch_finetune.py")
          c = p.read_text(); lines = c.split("\n"); ins = 0
          for i, ln in enumerate(lines):
              if ln.startswith("import ") or ln.startswith("from "): ins = i + 1
          lines.insert(ins, shim); p.write_text("\n".join(lines))
          p = Path("/workspace/Isaac-GR00T/gr00t/configs/training/training_config.py")
          c = p.read_text()
          c = c.replace('use_ddp: bool = False','use_ddp: bool = True')
          c = c.replace('gradient_checkpointing: bool = False','gradient_checkpointing: bool = True')
          p.write_text(c)
          print("[patch] DDP+grad-ckpt applied")
          PY

          # PyAV video_utils patch
          python - <<PY_PATCH
          from pathlib import Path
          src = Path("/workspace/Isaac-GR00T/gr00t/utils/video_utils.py").read_text()
          if "import av as _avlib" not in src:
              src = "import av as _avlib\nimport torch as _torch\n" + src
          shim = "\n\nclass _AvVideoDecoder:\n"
          shim += "    def __init__(self, source, **kw):\n"
          shim += "        self._frames = []\n"
          shim += "        c = _avlib.open(str(source))\n"
          shim += "        s = c.streams.video[0]\n"
          shim += "        for f in c.decode(video=0):\n"
          shim += "            self._frames.append(_torch.from_numpy(f.to_ndarray(format='rgb24')))\n"
          shim += "        c.close()\n"
          shim += "        self.metadata = type('M',(),{'num_frames':len(self._frames),"
          shim += " 'duration_seconds':len(self._frames)/float(s.average_rate or 10),"
          shim += " 'average_fps':float(s.average_rate or 10),"
          shim += " 'height':s.height,'width':s.width})()\n"
          shim += "    def __len__(self): return len(self._frames)\n"
          shim += "    def __getitem__(self, i):\n"
          shim += "        if isinstance(i,(list,tuple)) or hasattr(i,'__iter__'):\n"
          shim += "            return _torch.stack([self._frames[int(j)] for j in i])\n"
          shim += "        return self._frames[int(i)]\n"
          shim += "    def get_frames_at(self, indices):\n"
          shim += "        return _torch.stack([self._frames[int(j)] for j in indices])\n"
          shim += "import torchcodec.decoders as _tc_dec\n"
          shim += "_tc_dec.VideoDecoder = _AvVideoDecoder\n"
          if "_AvVideoDecoder" not in src:
              src = src + shim
          Path("/workspace/Isaac-GR00T/gr00t/utils/video_utils.py").write_text(src)
          print("[patch] video_utils.py patched")
          PY_PATCH

          cp /scripts/av_vehicle_config.py /workspace/Isaac-GR00T/av_vehicle_config.py

          # Download GR00T base model
          pip install --quiet --no-cache-dir hf_transfer 2>&1 | tail -2 || true
          export HF_HUB_ENABLE_HF_TRANSFER=1
          export HF_HUB_DOWNLOAD_TIMEOUT=120
          python - <<"HFPY"
          import os
          from huggingface_hub import snapshot_download
          snapshot_download(os.environ["BASE_MODEL"], local_dir="/workspace/model", token=os.environ.get("HF_TOKEN"), max_workers=16)
          print("[hf] base model downloaded")
          HFPY
          test -f /workspace/model/config.json

          # W&B lineage init
          python - <<'PY'
          import os, time
          from pathlib import Path
          import wandb
          run = wandb.init(
              entity=os.environ.get("WANDB_ENTITY"),
              project=os.environ.get("WANDB_PROJECT","osmo-workflow"),
              name="groot-finetune",
              job_type="finetune", tags=["vla-finetune"],
              config={"base_model": os.environ["BASE_MODEL"],
                      "dataset_artifact": os.environ["WANDB_DATASET_ARTIFACT"],
                      "max_steps": int(os.environ.get("MAX_STEPS",2000)),
                      "global_batch_size": int(os.environ.get("GLOBAL_BATCH_SIZE",4)),
                      "grad_accum": int(os.environ.get("GRAD_ACCUM",2))},
              resume="allow")
          try:
              art = run.use_artifact(os.environ["WANDB_DATASET_ARTIFACT"], type="dataset")
              print(f"[wandb] linked dataset: {art.qualified_name}")
          except Exception as e:
              print(f"[wandb] artifact link skipped: {e}")
          Path("/tmp/wandb_run_id").write_text(run.id)
          run.finish()
          print(f"[wandb] run id={run.id}")
          PY
          export WANDB_RUN_ID="$(cat /tmp/wandb_run_id)"
          export WANDB_RESUME=allow
          export WANDB_NAME="groot-finetune"   # match output-dir basename; HF Trainer names the run after --output-dir

          # Train
          cd /workspace/Isaac-GR00T
          mkdir -p /workspace/groot-finetune
          torchrun --nproc_per_node=${NGPU} --standalone \
            gr00t/experiment/launch_finetune.py \
            --dataset-path "${DATASET_ROOT}" \
            --base-model-path /workspace/model \
            --output-dir /workspace/groot-finetune \
            --embodiment-tag "${EMBODIMENT_TAG}" \
            --modality-config-path /workspace/Isaac-GR00T/av_vehicle_config.py \
            --num-gpus ${NGPU} \
            --global-batch-size ${GLOBAL_BATCH_SIZE} \
            --gradient-accumulation-steps ${GRAD_ACCUM} \
            --max-steps ${MAX_STEPS} \
            --save-steps ${SAVE_STEPS} --save-total-limit 4 \
            --learning-rate ${LEARNING_RATE} --warmup-ratio 0.1 --weight-decay 1e-2 \
            --dataloader-num-workers 4 \
            --use-wandb 2>&1 | tee "${OUT}/train.log"

          FINAL_CKPT=$(ls -d /workspace/groot-finetune/checkpoint-* 2>/dev/null | sort -V | tail -1 || true)
          [[ -z "${FINAL_CKPT}" ]] && { echo "[ERROR] no checkpoint produced"; exit 1; }
          echo "[ckpt] ${FINAL_CKPT}"
          cp -r "${FINAL_CKPT}/." "${OUT}/checkpoint-final/"

          python - <<PY
          import json, os
          from pathlib import Path
          ckpt = Path("${FINAL_CKPT}")
          state = json.load(open(ckpt/"trainer_state.json")) if (ckpt/"trainer_state.json").exists() else {}
          losses = [e["loss"] for e in state.get("log_history",[]) if "loss" in e]
          metrics = {"final_checkpoint": ckpt.name,
                     "best_loss": round(min(losses),4) if losses else None,
                     "final_loss": round(losses[-1],4) if losses else None,
                     "max_steps": int(os.environ["MAX_STEPS"]),
                     "learning_rate": float(os.environ["LEARNING_RATE"])}
          json.dump(metrics, open("${OUT}/metrics.json","w"), indent=2)
          print("[metrics]", metrics)
          PY

          # Log finetuned model artifact
          python - <<'PY'
          import json, os
          from pathlib import Path
          import wandb
          OUT = Path(os.environ["OUT"])
          rid = Path("/tmp/wandb_run_id").read_text().strip()
          run = wandb.init(entity=os.environ.get("WANDB_ENTITY"),
              project=os.environ.get("WANDB_PROJECT","osmo-workflow"), id=rid, resume="must")
          metrics = json.load(open(OUT/"metrics.json")) if (OUT/"metrics.json").exists() else {}
          for k, v in metrics.items():
              if isinstance(v,(int,float)): run.summary[k] = v
          art = wandb.Artifact("groot-av-finetuned", type="model",
              description="GR00T N1.6-3B finetuned on Cosmos AV scenes",
              metadata=metrics)
          art.add_dir(str(OUT/"checkpoint-final"), name="model")
          if (OUT/"train.log").exists(): wandb.save(str(OUT/"train.log"), policy="now")
          run.log_artifact(art).wait()
          run.finish()
          print("[wandb] logged groot-av-finetuned artifact")
          PY

          echo "=== vla-finetune DONE ==="
  - name: base-eval-group
    tasks:
    - name: base-eval
      lead: true
      resource: eval-gpu
      inputs:
      - task: groot-finetune
      image: nvcr.io/nvidia/isaac-lab:2.3.2
      command: [bash]
      args: [/scripts/run.sh]
      credentials:
        workflow-secrets:
          HF_TOKEN: HF_TOKEN
          WANDB_API_KEY: WANDB_API_KEY
          WANDB_ENTITY: WANDB_ENTITY
      files:
      - path: /scripts/forklift_nav_env_cfg.py
        contents: |
          import os, glob, gymnasium as gym
          TASK_ID = "Isaac-Forklift-Nav-v0"

          def _find_forklift_usd():
              p = os.environ.get("FORKLIFT_USD_PATH")
              if p and os.path.exists(p): return p
              for pat in ["/workspace/assets/Isaac/Robots/Forklift/forklift_b.usd",
                          "/workspace/assets/Isaac/Robots/Forklift/*.usd",
                          "/isaac-sim/extsbuild/*/data/Isaac/Robots/Forklift/*.usd",
                          "/isaac-sim/extscache/*/data/Isaac/Robots/Forklift/*.usd"]:
                  for f in glob.glob(pat, recursive=True):
                      if ".thumb" not in f: return f
              return None

          _USD_PATH = _find_forklift_usd()
          _WH_PATH  = os.environ.get("WAREHOUSE_USD_PATH", "")
          _WH_OK    = bool(_WH_PATH and os.path.exists(_WH_PATH))
          print(f"[env_cfg] Forklift: {_USD_PATH}", flush=True)
          print(f"[env_cfg] Warehouse: {_WH_PATH if _WH_OK else 'using primitives'}", flush=True)
          if _USD_PATH is None:
              raise RuntimeError("No Forklift USD")

          import isaaclab.sim as sim_utils
          from isaaclab.assets import ArticulationCfg, AssetBaseCfg, RigidObjectCfg
          from isaaclab.actuators import ImplicitActuatorCfg
          from isaaclab.envs import ManagerBasedRLEnvCfg
          from isaaclab.managers import ObservationGroupCfg, ObservationTermCfg, TerminationTermCfg
          from isaaclab.scene import InteractiveSceneCfg
          from isaaclab.sensors import CameraCfg
          from isaaclab.utils import configclass
          import isaaclab.envs.mdp as mdp

          # Forklift spawns facing -X (forks at -X end of USD).
          # Pallet is at -8m (in -X direction) so forks approach correctly.
          # Rotation: 0° around Z = forks point in -X, which is our approach direction.
          FORKLIFT_CFG = ArticulationCfg(
              spawn=sim_utils.UsdFileCfg(usd_path=_USD_PATH),
              init_state=ArticulationCfg.InitialStateCfg(pos=(0.0, 0.0, 0.1),
                  joint_pos={"lift_joint": 0.0}),  # forks DOWN at spawn (slide under pallet)
              actuators={
                  "drive": ImplicitActuatorCfg(
                      joint_names_expr=["back_wheel_drive"],
                      effort_limit=500000.0, velocity_limit=500.0,
                      stiffness=0.0, damping=500000.0),
                  "steer": ImplicitActuatorCfg(
                      joint_names_expr=["back_wheel_swivel"],
                      effort_limit=2000.0, velocity_limit=3.0,
                      stiffness=10000.0, damping=500.0),
                  "lift": ImplicitActuatorCfg(
                      joint_names_expr=["lift_joint"],
                      effort_limit=20000.0, velocity_limit=2.0,
                      stiffness=0.0, damping=20000.0),
                  "rollers": ImplicitActuatorCfg(
                      joint_names_expr=["front_right_roller","back_left_roller",
                                        "back_right_roller","front_left_roller"],
                      effort_limit=0.0, velocity_limit=100.0,
                      stiffness=0.0, damping=0.0),
              })

          # Pallet DECK: DYNAMIC rigid body resting on static legs with a fork channel underneath.
          # Real physics: the forks must slide under and physically lift it (no kinematic attach),
          # and it blocks the forklift (cannot be driven through).
          PALLET_CFG = RigidObjectCfg(
              spawn=sim_utils.CuboidCfg(
                  size=(1.0, 0.8, 0.08),                       # thin deck
                  rigid_props=sim_utils.RigidBodyPropertiesCfg(
