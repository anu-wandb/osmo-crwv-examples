              def Reset(self,r,c): return self._disp("reset")
              def Step(self,r,c): return self._disp("step",_deser(r)["action"])
              def Health(self,r,c): return _ser({"ok":True})
              def Close(self,r,c): return self._disp("close")
              def GetActionLayout(self,r,c): return _ser(self._action_layout or {})
          def process(srv,op,pl):
              env=srv.env
              if op=="reset":
                  obs=env.reset(); obs=obs[0] if isinstance(obs,tuple) else obs
                  srv._episode+=1
