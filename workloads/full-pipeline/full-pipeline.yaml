                  else: obs,r,done,_=out; term,trunc=bool(done),False

                  rp=robot.data.root_pos_w[0].detach().cpu().numpy(); rx,ry=float(rp[0]),float(rp[1])
                  yaw=_yaw(robot.data.root_quat_w[0].detach().cpu().numpy())
                  pp=pal.data.root_pos_w[0].detach().cpu().numpy(); pallet_z=float(pp[2]); palx,paly=float(pp[0]),float(pp[1])
                  lifted=(pallet_z>rest_z+0.15)
