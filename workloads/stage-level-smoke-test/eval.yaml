        contents: |
          import os, sys, time, pickle, json, csv
          from pathlib import Path
          import numpy as np, grpc, imageio, wandb
          sys.path.insert(0,"/scripts"); sys.path.insert(0,"/workspace/Isaac-GR00T")
          import av_vehicle_config
          from gr00t.data.embodiment_tags import EmbodimentTag
          from gr00t.policy.gr00t_policy import Gr00tPolicy
          from vehicle_mapper import VehicleMapper

          N_EPISODES=int(os.environ.get("N_EPISODES","1"))
          MAX_STEPS=int(os.environ.get("MAX_EPISODE_STEPS","300"))
          TASK_DESC=os.environ.get("TASK_DESCRIPTION","Drive the forklift to the pallet, insert forks, and lift the pallet")
          SIM_ADDR=os.environ.get("SIM_RPC_ADDR",f"127.0.0.1:{os.environ.get('SIM_RPC_PORT','7000')}")
          OUT=Path(os.environ["OUT"])
          VIDS=OUT/"videos"; METR=OUT/"metrics"
          VIDS.mkdir(parents=True,exist_ok=True); METR.mkdir(parents=True,exist_ok=True)
          BASE_REF=os.environ.get("BASE_MODEL","nvidia/GR00T-N1.6-3B")
          FT_LOCAL=os.environ["FT_CKPT_DIR"]

          ser=lambda x: pickle.dumps(x,protocol=pickle.HIGHEST_PROTOCOL)
          deser=lambda x: pickle.loads(x)
          class SimClient:
              def __init__(self,addr):
                  ch=grpc.insecure_channel(addr,options=[
                      ("grpc.max_receive_message_length",256*1024*1024),
                      ("grpc.max_send_message_length",256*1024*1024)])
                  mk=lambda m: ch.unary_unary(f"/SimService/{m}",request_serializer=ser,response_deserializer=deser)
                  self.reset,self.step=mk("Reset"),mk("Step")
              def Reset(self): return self.reset({})
              def Step(self,action): return self.step({"action":action})

          run=wandb.init(
              entity=os.environ.get("WANDB_ENTITY"),
              project=os.environ.get("WANDB_PROJECT","osmo-workflow"),
              name=f"sim-eval-{os.environ.get('EVAL_MODEL','combined')}-model",
              job_type="eval", tags=["sim-eval","stage-3"],
              config={"stage":"3-eval","n_episodes":N_EPISODES,"max_steps":MAX_STEPS,
                      "task_desc":TASK_DESC,"robot":"forklift",
                      "finetuned_artifact":os.environ.get("WANDB_FT_ARTIFACT","")})
          try:
              art=run.use_artifact(os.environ.get("WANDB_FT_ARTIFACT","wandb-smle/osmo-workflow/groot-av-finetuned:latest"),type="model")
              print(f"[wandb] linked finetuned artifact: {art.qualified_name}",flush=True)
          except Exception as e:
              print(f"[wandb] artifact link skipped: {e}",flush=True)

          def load_policy(ckpt_dir, label="?"):
              import traceback as _tb
              try:
                  pol=Gr00tPolicy(model_path=ckpt_dir,embodiment_tag=EmbodimentTag.NEW_EMBODIMENT,device="cuda:0")
                  print(f"[eval/{label}] Gr00tPolicy loaded",flush=True); return pol
              except KeyError as ke:
                  print(f"[eval/{label}] KeyError {ke} — noop fallback",flush=True)
                  class _Noop:
                      def get_action(self,obs): return ({"vehicle_control":np.zeros((1,16,3),dtype=np.float32)},None)
                  return _Noop()
              except Exception as e:
                  print(f"[eval/{label}] failed: {e}",flush=True); _tb.print_exc()
              raise RuntimeError(f"Could not load policy from {ckpt_dir}")

          def run_rollouts(policy,label,mapper,sim):
              rows=[]
              for ep in range(N_EPISODES):
                  t0=time.time()
                  resp=sim.Reset()
                  proprio=resp["proprio"]; frame=resp.get("frame")
                  frames=[frame] if frame is not None else []
                  chunk,idx=[],0
                  dist_final,success,step=-1.0,False,0
                  for step in range(MAX_STEPS):
                      if idx>=len(chunk):
                          obs=mapper.obs_to_groot(proprio,frame,TASK_DESC)
                          try:
                              act,_=policy.get_action(obs)
                              chunk=mapper.action_chunk_from_groot(act,current_proprio=proprio); idx=0
                          except Exception as e:
                              print(f"[eval/{label}] policy err ep={ep} st={step}: {e}",flush=True)
                              chunk=[np.zeros(3,dtype=np.float32)]; idx=0
                      a=chunk[idx]; idx+=1
                      resp=sim.Step(a)
                      proprio=resp["proprio"]; frame=resp.get("frame")
                      if frame is not None: frames.append(frame)
                      dist_final=float(resp.get("dist_to_goal",-1.0))
                      success=bool(resp.get("success",False))
                      if resp.get("terminated") or resp.get("truncated"): break
                  dur=time.time()-t0
                  vp=VIDS/f"{label}_episode_{ep:03d}.mp4"
                  if frames:
                      imageio.mimsave(str(vp),[np.asarray(f,dtype=np.uint8) for f in frames if f is not None],fps=10)
                      run.log({f"eval/{label}/video":wandb.Video(str(vp),fps=10,format="mp4",
                                  caption=f"ep{ep} success={success} dist={dist_final:.2f}"),
                               f"eval/{label}/episode_success":int(success),
                               f"eval/{label}/episode_dist":dist_final,
                               f"eval/{label}/episode_steps":step+1,
                               f"eval/{label}/episode":ep})
                  rows.append({"policy":label,"episode":ep,"steps":step+1,
                               "success":int(success),"dist_to_goal":round(dist_final,4),"wall_s":round(dur,2)})
                  print(f"[eval/{label}] ep {ep}: success={success} dist={dist_final:.3f} steps={step+1}",flush=True)
              with open(METR/f"{label}_metrics.csv","w",newline="") as f:
                  w=csv.DictWriter(f,fieldnames=list(rows[0].keys())); w.writeheader(); w.writerows(rows)
              n=len(rows); succ=sum(r["success"] for r in rows)
              dists=[r["dist_to_goal"] for r in rows if r["dist_to_goal"]>=0]
              summary={"policy":label,"n_episodes":n,
                       "success_rate":round(succ/n,3),
                       "mean_dist_to_goal":round(sum(dists)/max(1,len(dists)),3),
                       "mean_steps":round(sum(r["steps"] for r in rows)/n,1)}
              json.dump(summary,open(METR/f"{label}_summary.json","w"),indent=2)
              for k,v in summary.items():
                  if isinstance(v,(int,float)): run.summary[f"{label}/{k}"]=v
              tbl=wandb.Table(columns=list(rows[0].keys()),data=[list(r.values()) for r in rows])
              run.log({f"eval/{label}/episodes_table":tbl})
              return summary

          sim=SimClient(SIM_ADDR); mapper=VehicleMapper()
          try:
              import pickle as _pkl
              ch_meta=grpc.insecure_channel(SIM_ADDR)
              gal=ch_meta.unary_unary("/SimService/GetActionLayout",
                  request_serializer=lambda x:_pkl.dumps(x,protocol=_pkl.HIGHEST_PROTOCOL),
                  response_deserializer=lambda x:_pkl.loads(x))
              layout=gal({})
              print(f"[eval] sim action layout: {layout}",flush=True)
          except Exception as e:
              print(f"[eval] GetActionLayout failed (continuing): {e}",flush=True)

          from huggingface_hub import snapshot_download
          print(f"[eval] downloading base model: {BASE_REF}",flush=True)
          base_local="/workspace/base_model"
          snapshot_download(BASE_REF,local_dir=base_local,token=os.environ.get("HF_TOKEN"))

          import re as _re
          def _patch_flash_attn_strings(root_dir):
              if not Path(root_dir).exists(): return 0
              n=0
              for p in Path(root_dir).rglob("*.py"):
                  try: c=p.read_text()
                  except Exception: continue
                  if "flash_attention_2" not in c: continue
                  c0=c
                  c=c.replace("'flash_attention_2'","'eager'").replace('"flash_attention_2"','"eager"')
                  c=_re.sub(r"^(\s*)assert\s+.*flash_attention_2.*$",
                            r"\1pass  # PATCHED",c,flags=_re.MULTILINE)
                  if c!=c0: p.write_text(c); n+=1
              return n
          for d in (base_local,FT_LOCAL,"/root/.cache/huggingface/modules"):
              k=_patch_flash_attn_strings(d)
              if k: print(f"[runtime-patch] {d}: {k} files patched",flush=True)

          # Base policy: scripted P-controller so base videos show actual movement
          class ScriptedPickPolicy:
              # Oracle on 9-D state [lift,shift,steer,rate,wheelvel,tilt,pallet_dx,pallet_dy,pallet_dyaw]:
              # drive forks-first to the pallet (relative coords), then raise forks to grasp+lift.
              def __init__(self): self._step=0
              def reset(self): self._step=0
              def get_action(self,obs):
                  import math
                  state=obs.get("state",{}).get("vehicle_state")
                  if state is None: return {"vehicle_control":np.zeros((1,8,3),dtype=np.float32)},None
                  s=np.asarray(state).reshape(-1)
                  pdx=float(s[6]) if len(s)>6 else 0.0          # pallet_dx (world: pallet-robot)
                  pdy=float(s[7]) if len(s)>7 else 0.0          # pallet_dy
                  kh=-(float(s[8]) if len(s)>8 else 0.0)        # robot heading = -pallet_dyaw
                  dist=math.sqrt(pdx*pdx+pdy*pdy)
                  self._step+=1
                  if dist>1.2:   # drive forks-first up to the pallet; physics blocks the body at the deck
                      desired=math.atan2(pdy,pdx)-math.pi       # aim forks (face kh+pi) at the pallet
                      err=(desired-kh+math.pi)%(2*math.pi)-math.pi
                      steer=float(np.clip(2.5*err,-1,1))
                      throttle=float(np.clip(0.5*min(dist/3.0,1.0),0.2,0.55))  # gentle approach
                      lift=0.0
                  else:
                      steer=0.0; throttle=0.0; lift=1.0         # forks under the deck -> raise to lift it
                  chunk=np.array([[steer,throttle,lift]]*8,dtype=np.float32)[np.newaxis]
                  return {"vehicle_control":chunk},None
          base_policy=ScriptedPickPolicy()
          base_summary=run_rollouts(base_policy,"base",mapper,sim)
          del base_policy

          # Fix GQA: Qwen2 eager attention does query@key.T but 16q!=8kv heads
          # Monkey-patch torch.matmul to auto-expand KV heads for GQA (4D tensors)
          try:
              import torch as _torch
              _orig_mm = _torch.matmul
              def _gqa_matmul(a, b):
                  if a.dim()==4 and b.dim()==4 and a.shape[1]!=b.shape[1] and a.shape[1]%b.shape[1]==0:
                      n = a.shape[1]//b.shape[1]
                      b = b.unsqueeze(2).expand(-1,-1,n,-1,-1).reshape(b.shape[0],a.shape[1],b.shape[2],b.shape[3])
                  return _orig_mm(a,b)
              _torch.matmul = _gqa_matmul
              print("[eval] patched torch.matmul for GQA support",flush=True)
          except Exception as ep: print(f"[eval] matmul patch err: {ep}",flush=True)
          # Also patch F.scaled_dot_product_attention for GQA (Eagle3/Qwen2 sdpa path)
          try:
              import torch.nn.functional as _F
              _orig_sdpa = _F.scaled_dot_product_attention
              def _gqa_sdpa(query, key, value, *a, **kw):
                  if query.dim()==4 and key.dim()==4 and query.shape[1]!=key.shape[1] and query.shape[1]%key.shape[1]==0:
                      n = query.shape[1]//key.shape[1]
                      key = key.repeat_interleave(n, dim=1)
                      value = value.repeat_interleave(n, dim=1)
                  return _orig_sdpa(query, key, value, *a, **kw)
              _F.scaled_dot_product_attention = _gqa_sdpa
              print("[eval] patched F.scaled_dot_product_attention for GQA",flush=True)
          except Exception as ep: print(f"[eval] sdpa patch err: {ep}",flush=True)
          ft_policy=load_policy(FT_LOCAL,label="finetuned")
          ft_summary=run_rollouts(ft_policy,"finetuned",mapper,sim)
          del ft_policy

          delta={"success_rate_delta":round(ft_summary["success_rate"]-base_summary["success_rate"],3),
                 "mean_dist_to_goal_delta":round(ft_summary["mean_dist_to_goal"]-base_summary["mean_dist_to_goal"],3),
                 "mean_steps_delta":round(ft_summary["mean_steps"]-base_summary["mean_steps"],1)}
          comparison={"base":base_summary,"finetuned":ft_summary,"delta":delta,
                      "verdict":"finetuned_better" if delta["success_rate_delta"]>0
                                 else("tie" if delta["success_rate_delta"]==0 else "base_better")}
          json.dump(comparison,open(OUT/"comparison.json","w"),indent=2)
          for k,v in delta.items():
              if isinstance(v,(int,float)): run.summary[k]=v
          run.summary["verdict"]=comparison["verdict"]
          tbl2=wandb.Table(columns=["policy","success_rate","mean_dist_to_goal","mean_steps"],data=[
              ["base",base_summary["success_rate"],base_summary["mean_dist_to_goal"],base_summary["mean_steps"]],
              ["finetuned",ft_summary["success_rate"],ft_summary["mean_dist_to_goal"],ft_summary["mean_steps"]]])
          run.log({"compare/table":tbl2,
                   "compare/success_rate_chart":wandb.plot.bar(tbl2,"policy","success_rate",title="Success rate")})
          wandb.save(str(OUT/"comparison.json"),policy="now")
          run.finish()
          print(f"[eval] complete: {comparison}",flush=True)
      - path: /scripts/probe_nucleus.py
        contents: |
          import os, subprocess, sys
          def probe():
              # Try Isaac Sim nucleus API
              try:
                  from omni.isaac.nucleus import get_assets_root_path
                  root = get_assets_root_path()
                  if root: print(f"PROBE:NUCLEUS_ROOT={root}")
              except Exception as e:
                  print(f"PROBE:NUCLEUS_ERR={e}")
              # Search bundled assets for forklift
              for base in ["/workspace/isaaclab/_isaac_sim", "/isaac-sim", "/root/.local/share/ov/pkg"]:
                  try:
                      r = subprocess.run(["find", base, "-name", "forklift*.usd", "-maxdepth", "12"],
                                         capture_output=True, text=True, timeout=20)
                      for p in r.stdout.strip().split("\n"):
                          if p and "forklift" in p.lower():
                              print(f"PROBE:LOCAL_USD={p}")
                  except Exception: pass
              # Env vars
              for k in ["NUCLEUS_SERVER","ISAAC_NUCLEUS_PATH","ISAAC_ASSETS_ROOT"]:
                  v = os.environ.get(k,"")
                  if v: print(f"PROBE:ENV_{k}={v}")
          probe()
      - path: /scripts/run.sh
        contents: |
          #!/usr/bin/env bash
          set -euo pipefail
          export N_EPISODES="${N_EPISODES:-1}"
          export MAX_EPISODE_STEPS="${MAX_EPISODE_STEPS:-300}"
          export TASK_DESCRIPTION="${TASK_DESCRIPTION:-Drive the forklift to the green goal marker}"
          export SIM_RPC_PORT="${SIM_RPC_PORT:-7000}"
          export WANDB_PROJECT="${WANDB_PROJECT:-osmo-workflow}"
          export BASE_MODEL="${BASE_MODEL:-nvidia/GR00T-N1.6-3B}"
          export WANDB_FT_ARTIFACT="${WANDB_FT_ARTIFACT:-wandb-smle/osmo-workflow/groot-av-finetuned:latest}"
          export OUT="{{output}}"
          mkdir -p "${OUT}/videos" "${OUT}/metrics"

          echo "=== sim-eval: downloading finetuned model from W&B ==="
          apt-get update -y && apt-get install -y --no-install-recommends \
            python3 python3-pip python3-venv python3-dev git ffmpeg ca-certificates curl
          rm -rf /var/lib/apt/lists/*
          python3 -m pip install --quiet --break-system-packages wandb

          # Download finetuned checkpoint from W&B artifact
          python3 - <<'PY'
          import os, wandb
          api = wandb.Api()
          artifact_ref = os.environ["WANDB_FT_ARTIFACT"]
          print(f"[data] downloading {artifact_ref}", flush=True)
          art = api.artifact(artifact_ref, type="model")
          art.download(root="/workspace/finetuned")
          import pathlib
          for f in list(pathlib.Path("/workspace/finetuned").rglob("*"))[:10]:
              print(f"  {f}", flush=True)
          PY
          export FT_CKPT_DIR="/workspace/finetuned/model"

          ISAACLAB_SH=/workspace/isaaclab/isaaclab.sh
          ISAAC_PY=/workspace/isaaclab/_isaac_sim/python.sh

          # Probe Isaac Sim for nucleus assets path
          echo "[probe] Checking Isaac Sim nucleus path..."
          ${ISAAC_PY} /scripts/probe_nucleus.py 2>/dev/null | grep "^PROBE:" > /tmp/isaac_probe.txt 2>/dev/null || true
          echo "[probe] results:"
          cat /tmp/isaac_probe.txt 2>/dev/null || echo "  (empty)"

          # Extract nucleus root if found
          NUCLEUS_ROOT=$(grep "^PROBE:NUCLEUS_ROOT=" /tmp/isaac_probe.txt 2>/dev/null | head -1 | cut -d= -f2- || true)
          LOCAL_USD=$(grep "^PROBE:LOCAL_USD=" /tmp/isaac_probe.txt 2>/dev/null | head -1 | cut -d= -f2- || true)
          if [[ -n "${NUCLEUS_ROOT}" ]]; then
            export ISAAC_NUCLEUS_ROOT="${NUCLEUS_ROOT}"
            echo "[probe] nucleus root: ${NUCLEUS_ROOT}"
          elif [[ -n "${LOCAL_USD}" ]]; then
            export FORKLIFT_USD_PATH="${LOCAL_USD}"
            echo "[probe] using local bundled USD: ${LOCAL_USD}"
          fi

          # Download Forklift + Warehouse USDs from NVIDIA S3 (fallback / supplement)
          mkdir -p /workspace/assets/Isaac/Robots/Forklift
          mkdir -p /workspace/assets/Isaac/Environments/Simple_Warehouse
          AWS_BASE="https://omniverse-content-production.s3-us-west-2.amazonaws.com"

          mirror_dir() {
            local _prefix="$1"
            local _dest_root="$2"
            local _listing="/tmp/mirror_$$.xml"
            echo "[assets] mirroring ${_prefix}"
            curl -fsSL "${AWS_BASE}/?list-type=2&prefix=${_prefix}" -o "${_listing}" 2>/dev/null || return 1
            local _key _rel _dest
            while IFS= read -r _key; do
              _rel="${_key#${_prefix}}"
              _dest="${_dest_root}/${_rel}"
              mkdir -p "$(dirname "${_dest}")"
              curl -fsSL "${AWS_BASE}/${_key}" -o "${_dest}" 2>/dev/null                 && echo "[assets]   OK  ${_rel}" || echo "[assets]   ERR ${_rel}"
            done < <(grep -oE "<Key>[^<]+</Key>" "${_listing}" | sed -E "s|</?Key>||g")
          }
          mirror_dir "Assets/Isaac/4.5/Isaac/Environments/Simple_Warehouse/"                     "/workspace/assets/Isaac/Environments/Simple_Warehouse"
          # Direct URL download — S3 list-type=2 paginates at 1000 objects, top-level
          # warehouse USDs (full_warehouse.usd etc) appear after 1000+ prop files
          WH_BASE="${AWS_BASE}/Assets/Isaac/4.5/Isaac/Environments/Simple_Warehouse"
          # Try Isaac 5.0 paths (newer, more reliable for headless) AND 4.5 fallback
          WH_BASE50="${AWS_BASE}/Assets/Isaac/5.0/Isaac/Environments/Simple_Warehouse"
          for _wh_name in warehouse_with_forklifts.usd full_warehouse.usd warehouse_multiple_shelves.usd warehouse.usd; do
            _dest="/workspace/assets/Isaac/Environments/Simple_Warehouse/${_wh_name}"
            if [[ ! -s "${_dest}" ]]; then
              curl -fsSL "${WH_BASE50}/${_wh_name}" -o "${_dest}" 2>/dev/null &&                 echo "[assets]   OK (v5.0) ${_wh_name}" ||                 (curl -fsSL "${WH_BASE}/${_wh_name}" -o "${_dest}" 2>/dev/null &&                 echo "[assets]   OK (v4.5) ${_wh_name}" || echo "[assets]   MISS ${_wh_name}")
            fi
          done
          for _wh_name in warehouse_with_forklifts.usd full_warehouse.usd warehouse_multiple_shelves.usd warehouse.usd; do
            _cand="/workspace/assets/Isaac/Environments/Simple_Warehouse/${_wh_name}"
            [[ -s "${_cand}" ]] && { export WAREHOUSE_USD_PATH="${_cand}"; break; }
          done
          echo "[assets] WAREHOUSE_USD_PATH=${WAREHOUSE_USD_PATH:-NOT FOUND}"

          # Forklift USD: download from S3 if not found via nucleus/local
          if [[ -z "${FORKLIFT_USD_PATH:-}" && -z "${ISAAC_NUCLEUS_ROOT:-}" ]]; then
            curl -fsSL "${AWS_BASE}/?list-type=2&prefix=Assets/Isaac/4.5/Isaac/Robots/Forklift/"                 -o /tmp/forklift_listing.xml || true
            if [[ -s /tmp/forklift_listing.xml ]]; then
              keys=$(grep -oE "<Key>[^<]+</Key>" /tmp/forklift_listing.xml | sed -E "s|</?Key>||g")
              for key in ${keys}; do
                rel="${key#Assets/Isaac/4.5/Isaac/Robots/Forklift/}"
                dest="/workspace/assets/Isaac/Robots/Forklift/${rel}"
                mkdir -p "$(dirname "${dest}")"
                curl -fsSL "${AWS_BASE}/${key}" -o "${dest}" 2>/dev/null
              done
            fi
            if [[ ! -s /workspace/assets/Isaac/Robots/Forklift/forklift_b.usd ]]; then
              curl -fsSL "${AWS_BASE}/Assets/Isaac/4.5/Isaac/Robots/Forklift/forklift_b.usd"                 -o /workspace/assets/Isaac/Robots/Forklift/forklift_b.usd || true
            fi
            [[ -s /workspace/assets/Isaac/Robots/Forklift/forklift_b.usd ]]               && export FORKLIFT_USD_PATH="/workspace/assets/Isaac/Robots/Forklift/forklift_b.usd"               || { echo "[ERROR] forklift USD not found"; exit 1; }
          fi
          echo "[forklift] using ${FORKLIFT_USD_PATH:-nucleus:${ISAAC_NUCLEUS_ROOT}/Isaac/Robots/Forklift/forklift_b.usd}"

          echo "=== Stage 3: Forklift nav eval ==="
          nvidia-smi -L | head -10
          export OMNI_KIT_ACCEPT_EULA=YES ACCEPT_EULA=Y PRIVACY_CONSENT=Y
          export PYTHONPATH="/scripts${PYTHONPATH:+:${PYTHONPATH}}"
          "${ISAAC_PY}" -m pip install --no-cache-dir -q \
            grpcio==1.66.2 gymnasium==1.2.1 imageio==2.34.1 imageio-ffmpeg==0.4.9 wandb==0.25.0

          echo "[sim] starting sim server on :${SIM_RPC_PORT}"
          ISAAC_TASK=Isaac-Forklift-Nav-v0 \
            "${ISAACLAB_SH}" -p /scripts/sim_server.py 2>&1 | tee "${OUT}/sim.log" &
          SIM_PID=$!

          # GR00T policy venv
          python3 -m venv /opt/groot-venv
          source /opt/groot-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir torch==2.7.1 torchvision==0.22.1 \
            --index-url https://download.pytorch.org/whl/cu128
          python -m pip install --no-cache-dir \
            transformers==4.51.3 accelerate==0.33.0 safetensors==0.4.5 \
            grpcio==1.66.2 numpy==1.26.4 imageio imageio-ffmpeg \
            albumentations==1.4.18 diffusers==0.35.1 dm-tree==0.1.8 \
            datasets==3.6.0 peft==0.17.1 msgpack==1.1.0 msgpack-numpy==0.4.8 \
            omegaconf==2.3.0 tyro==0.9.17 einops scipy termcolor av huggingface_hub \
            wandb==0.25.0 lmdb pyarrow
          if [[ ! -d /workspace/Isaac-GR00T ]]; then
            git clone --depth 1 --branch n1.6-release https://github.com/NVIDIA/Isaac-GR00T /workspace/Isaac-GR00T
          fi
          python -m pip install --no-deps -e /workspace/Isaac-GR00T
          export PYTHONPATH="/workspace/Isaac-GR00T:/scripts${PYTHONPATH:+:${PYTHONPATH}}"
          python /scripts/install_flash_attn_stub.py
          python /scripts/patch_eagle_for_sdpa.py
          cp /scripts/av_vehicle_config.py /workspace/Isaac-GR00T/av_vehicle_config.py

          if ! python /scripts/wait_for_sim.py; then
            echo "[sim] FAILED — sim.log:"; tail -n 200 "${OUT}/sim.log" 2>/dev/null || true; exit 1
          fi

          set +e
          PYTHONOPTIMIZE=1 python /scripts/eval_runner.py
          EVAL_RC=$?
          set -e

          # SIM_PID is the tee PID (sim is piped through tee), so killing it leaves Isaac Sim
          # running -> task zombies and hangs holding GPUs. Kill the real sim process by name.
          echo "[shutdown] stopping Isaac Sim sim_server ..."
          pkill -9 -f sim_server.py 2>/dev/null || true
          pkill -9 -f "kit" 2>/dev/null || true
          kill -9 ${SIM_PID} 2>/dev/null || true
          echo "=== sim-eval DONE (eval rc=${EVAL_RC}) ==="
          exit ${EVAL_RC}
