      - path: /scripts/eval_runner.py
        contents: |
          """ONE W&B run, runs BOTH base + finetuned policies sequentially.

          LINEAGE: this run uses the groot-av-finetuned artifact (lineage edge).
          Logs base/* and finetuned/* videos+metrics under the same run, plus a
          comparison table.
          """
          import os, sys, time, pickle, json, csv
          from pathlib import Path
          import numpy as np, grpc, imageio, wandb
          sys.path.insert(0, "/scripts"); sys.path.insert(0, "/workspace/Isaac-GR00T")
          import av_vehicle_config  # noqa: F401
          from gr00t.data.embodiment_tags import EmbodimentTag
          from gr00t.policy.gr00t_policy import Gr00tPolicy
          from vehicle_mapper import VehicleMapper

          N_EPISODES = int(os.environ.get("N_EPISODES", "20"))
          MAX_STEPS  = int(os.environ.get("MAX_EPISODE_STEPS", "300"))
          TASK_DESC  = os.environ.get("TASK_DESCRIPTION", "Drive the forklift to the green goal marker")
          SIM_ADDR   = os.environ.get("SIM_RPC_ADDR", f"127.0.0.1:{os.environ.get('SIM_RPC_PORT','7000')}")
          OUT  = Path(os.environ["OUT"])
          VIDS = OUT / "videos"; METR = OUT / "metrics"
          VIDS.mkdir(parents=True, exist_ok=True); METR.mkdir(parents=True, exist_ok=True)
          BASE_REF = os.environ.get("BASE_MODEL", "nvidia/GR00T-N1.6-3B")
          FT_LOCAL = os.environ["FT_CKPT_DIR"]

          ser = lambda x: pickle.dumps(x, protocol=pickle.HIGHEST_PROTOCOL)
          deser = lambda x: pickle.loads(x)
          class SimClient:
              def __init__(self, addr):
                  ch = grpc.insecure_channel(addr, options=[
                      ("grpc.max_receive_message_length", 256*1024*1024),
                      ("grpc.max_send_message_length",    256*1024*1024)])
                  mk = lambda m: ch.unary_unary(f"/SimService/{m}", request_serializer=ser, response_deserializer=deser)
                  self.reset, self.step = mk("Reset"), mk("Step")
              def Reset(self):       return self.reset({})
              def Step(self, action): return self.step({"action": action})

          run = wandb.init(
              entity=os.environ.get("WANDB_ENTITY"),
              project=os.environ.get("WANDB_PROJECT","osmo-workflow"),
              name="policy-eval",
              job_type="eval",
              tags=["av-pipeline","stage-3-eval","forklift"],
              config={"stage":"3-eval","n_episodes":N_EPISODES,"max_steps":MAX_STEPS,
                      "task_desc":TASK_DESC, "robot":"forklift"},
          )
          # LINEAGE: consume the groot-av-finetuned artifact
          try:
              art = run.use_artifact(
                  f"{os.environ.get('WANDB_ENTITY')}/{run.project}/groot-av-finetuned:latest",
                  type="model")
              print(f"[wandb] linked input artifact: {art.qualified_name}", flush=True)
          except Exception as e:
              print(f"[wandb] could not link finetune artifact: {e}", flush=True)

          def load_policy(ckpt_dir, label="?"):
              import traceback as _tb
              try:
                  pol = Gr00tPolicy(model_path=ckpt_dir,
                                    embodiment_tag=EmbodimentTag.NEW_EMBODIMENT,
                                    device="cuda:0")
                  print(f"[eval/{label}] Gr00tPolicy loaded", flush=True)
                  return pol
              except KeyError as ke:
                  # Base HF GR00T doesn't have NEW_EMBODIMENT registered in its
                  # saved config (only the finetuned model does). Fall back to a
                  # noop policy so the eval still produces a baseline.
                  print(f"[eval/{label}] KeyError on policy load ({ke}). Falling back to noop policy.", flush=True)
                  class _NoopPolicy:
                      def get_action(self, obs):
                          return ({"vehicle_control": np.zeros((1, 16, 3), dtype=np.float32)}, None)
                  return _NoopPolicy()
              except Exception as e:
                  print(f"[eval/{label}] init failed: {type(e).__name__}: {e}", flush=True)
                  _tb.print_exc()
              raise RuntimeError(f"Gr00tPolicy could not be loaded from {ckpt_dir}")

          def run_rollouts(policy, label, mapper, sim):
              rows = []
              for ep in range(N_EPISODES):
                  t0 = time.time()
                  resp = sim.Reset()
                  proprio = resp["proprio"]; frame = resp.get("frame")
                  frames = [frame] if frame is not None else []
                  chunk, idx = [], 0
                  dist_final, success, step = -1.0, False, 0
                  for step in range(MAX_STEPS):
                      if idx >= len(chunk):
                          obs = mapper.obs_to_groot(proprio, frame, TASK_DESC)
                          try:
                              act, _ = policy.get_action(obs)
                              chunk = mapper.action_chunk_from_groot(act, current_proprio=proprio); idx = 0
                          except Exception as e:
                              print(f"[eval/{label}] policy err ep={ep} st={step}: {e}", flush=True)
                              chunk = [np.zeros(3, dtype=np.float32)]; idx = 0
                      a = chunk[idx]; idx += 1
                      resp = sim.Step(a)
                      proprio = resp["proprio"]; frame = resp.get("frame")
                      if frame is not None: frames.append(frame)
                      dist_final = float(resp.get("dist_to_goal", -1.0))
                      success = bool(resp.get("success", False))
                      if resp.get("terminated") or resp.get("truncated"): break
                  dur = time.time() - t0
                  vp = VIDS / f"{label}_episode_{ep:03d}.mp4"
                  if frames:
                      imageio.mimsave(str(vp), [np.asarray(f, dtype=np.uint8) for f in frames if f is not None], fps=10)
                      run.log({f"eval/{label}/video": wandb.Video(str(vp), fps=10, format="mp4",
                                  caption=f"ep{ep} success={success} dist={dist_final:.2f}"),
                               f"eval/{label}/episode_success": int(success),
                               f"eval/{label}/episode_dist": dist_final,
                               f"eval/{label}/episode_steps": step + 1,
                               f"eval/{label}/episode": ep})
                  rows.append({"policy":label, "episode":ep, "steps":step+1,
                               "success":int(success), "dist_to_goal":round(dist_final,4),
                               "wall_s":round(dur,2)})
                  print(f"[eval/{label}] ep {ep}: success={success} dist={dist_final:.3f} steps={step+1}", flush=True)
              with open(METR / f"{label}_metrics.csv","w", newline="") as f:
                  w = csv.DictWriter(f, fieldnames=list(rows[0].keys())); w.writeheader(); w.writerows(rows)
              n = len(rows); succ = sum(r["success"] for r in rows)
              dists = [r["dist_to_goal"] for r in rows if r["dist_to_goal"] >= 0]
              summary = {"policy":label, "n_episodes":n,
                         "success_rate":round(succ/n,3),
                         "mean_dist_to_goal":round(sum(dists)/max(1,len(dists)),3),
                         "mean_steps":round(sum(r["steps"] for r in rows)/n,1)}
              json.dump(summary, open(METR/f"{label}_summary.json","w"), indent=2)
              for k,v in summary.items():
                  if isinstance(v,(int,float)): run.summary[f"{label}/{k}"] = v
              tbl = wandb.Table(columns=list(rows[0].keys()), data=[list(r.values()) for r in rows])
              run.log({f"eval/{label}/episodes_table": tbl})
              return summary

          sim = SimClient(SIM_ADDR)
          mapper = VehicleMapper()
          # ROBUST: query the sim for its discovered drive/steer joint layout
          try:
              import pickle as _pkl
              ch_meta = grpc.insecure_channel(SIM_ADDR)
              gal = ch_meta.unary_unary("/SimService/GetActionLayout",
                  request_serializer=lambda x: _pkl.dumps(x, protocol=_pkl.HIGHEST_PROTOCOL),
                  response_deserializer=lambda x: _pkl.loads(x))
              layout = gal({})
              print(f"[eval] sim action layout: {layout}", flush=True)
              if layout and not layout.get("drive_indices"):
                  print("[eval] WARN: no drive joints discovered — forklift will not move forward", flush=True)
              if layout and not layout.get("steer_indices"):
                  print("[eval] WARN: no steer joints discovered — forklift will not turn", flush=True)
          except Exception as e:
              print(f"[eval] GetActionLayout query failed (continuing): {e}", flush=True)

          # ---- BASE ----
          from huggingface_hub import snapshot_download
          print(f"[eval] downloading base model: {BASE_REF}", flush=True)
          base_local = "/workspace/base_model"
          snapshot_download(BASE_REF, local_dir=base_local, token=os.environ.get("HF_TOKEN"))

          # MONKEY-PATCH AutoModel.from_config to force the text_config
          # ._attn_implementation to "flash_attention_2" string. Without this, the
          # Eagle-Block2A modeling code's `assert config.text_config._attn_implementation
          # == "flash_attention_2"` fires with the bizarre "got flash_attention_2"
          # message — the config class has an overridden __eq__ or property that
          # makes a literal string comparison fail. We re-set the attribute so the
          # IDENTITY (not just value) matches. Actual attention compute still goes
          # through our SDPA stub since flash_attn 2.7 has no sm_120 kernels.
          try:
              import transformers as _tfm
              _orig_from_config = _tfm.AutoModel.from_config
              def _from_config_patched(config, *args, **kwargs):
                  tc = getattr(config, "text_config", None)
                  if tc is not None:
                      object.__setattr__(tc, "_attn_implementation", "flash_attention_2")
                      try: object.__setattr__(tc, "attn_implementation", "flash_attention_2")
                      except Exception: pass
                  return _orig_from_config(config, *args, **kwargs)
              _tfm.AutoModel.from_config = _from_config_patched
              # Also force-set on AutoModel.from_pretrained for completeness
              _orig_from_pretrained = _tfm.AutoModel.from_pretrained
              def _from_pretrained_patched(*args, **kwargs):
                  m = _orig_from_pretrained(*args, **kwargs)
                  return m
              _tfm.AutoModel.from_pretrained = _from_pretrained_patched
              print("[eval] patched AutoModel.from_config to coerce _attn_implementation", flush=True)
          except Exception as e:
              print(f"[eval] AutoModel monkey-patch failed: {type(e).__name__}: {e}", flush=True)
          import re as _re
          def _patch_flash_attn_strings(root_dir):
              if not Path(root_dir).exists(): return 0
              n = 0
              for p in Path(root_dir).rglob("*.py"):
                  try: c = p.read_text()
                  except Exception: continue
                  if "flash_attention_2" not in c: continue
                  c0 = c
                  c = c.replace("'flash_attention_2'", "'eager'").replace('"flash_attention_2"', '"eager"')
                  c = _re.sub(r"^(\s*)assert\s+.*flash_attention_2.*$",
                              r"\1pass  # PATCHED: flash_attention_2 -> eager",
                              c, flags=_re.MULTILINE)
                  if c != c0: p.write_text(c); n += 1; print(f"[runtime-patch] {p}", flush=True)
              return n
          for d in (base_local, FT_LOCAL, "/root/.cache/huggingface/modules"):
              k = _patch_flash_attn_strings(d)
              if k: print(f"[runtime-patch] {d}: patched {k} files", flush=True)
          base_policy = load_policy(base_local, label="base")
          base_summary = run_rollouts(base_policy, "base", mapper, sim)
          del base_policy

          # ---- FINETUNED ----
          ft_policy = load_policy(FT_LOCAL, label="finetuned")
          ft_summary = run_rollouts(ft_policy, "finetuned", mapper, sim)
          del ft_policy

          # ---- COMPARE ----
          delta = {
              "success_rate_delta":      round(ft_summary["success_rate"]      - base_summary["success_rate"],      3),
              "mean_dist_to_goal_delta": round(ft_summary["mean_dist_to_goal"] - base_summary["mean_dist_to_goal"], 3),
              "mean_steps_delta":        round(ft_summary["mean_steps"]        - base_summary["mean_steps"],        1),
          }
          comparison = {"base": base_summary, "finetuned": ft_summary, "delta": delta,
                        "verdict": "finetuned_better" if delta["success_rate_delta"] > 0
                                    else ("tie" if delta["success_rate_delta"] == 0 else "base_better")}
          json.dump(comparison, open(OUT/"comparison.json","w"), indent=2)
          for k,v in delta.items():
              if isinstance(v,(int,float)): run.summary[k] = v
          run.summary["verdict"] = comparison["verdict"]
          tbl2 = wandb.Table(columns=["policy","success_rate","mean_dist_to_goal","mean_steps"], data=[
              ["base",       base_summary["success_rate"], base_summary["mean_dist_to_goal"], base_summary["mean_steps"]],
              ["finetuned",  ft_summary["success_rate"],   ft_summary["mean_dist_to_goal"],   ft_summary["mean_steps"]],
          ])
          run.log({"compare/table": tbl2,
                   "compare/success_rate_chart": wandb.plot.bar(tbl2, "policy", "success_rate", title="Success rate")})
          wandb.save(str(OUT/"comparison.json"), policy="now")
          run.finish()
          print(f"[eval] complete: {comparison}", flush=True)
      - path: /scripts/run.sh
        contents: |
          #!/usr/bin/env bash
          set -euo pipefail
          export N_EPISODES="${N_EPISODES:-20}"
          export MAX_EPISODE_STEPS="${MAX_EPISODE_STEPS:-300}"
          export TASK_DESCRIPTION="${TASK_DESCRIPTION:-Drive the forklift to the green goal marker}"
          export SIM_RPC_PORT="${SIM_RPC_PORT:-7000}"
          export WANDB_PROJECT="${WANDB_PROJECT:-osmo-workflow}"
          export BASE_MODEL="${BASE_MODEL:-nvidia/GR00T-N1.6-3B}"
          export FT_CKPT_DIR="{{input:0}}/checkpoint-final"
          export OUT="{{output}}"
          mkdir -p "${OUT}/videos" "${OUT}/metrics"

          # Isaac Lab images don't bundle the full asset library locally —
          # normally Isaac Sim pulls them from a Nucleus server. CoreWeave pods
          # don't have a Nucleus mount, so we download the Forklift USD directly
          # from NVIDIA's public S3 mirror at omniverse-content-production.
          # Download Forklift USD + Simple_Warehouse env USD from NVIDIA's public
          # Omniverse asset mirror. WAREHOUSE_USD_PATH is consumed by env_cfg.
          mkdir -p /workspace/assets/Isaac/Robots/Forklift
          mkdir -p /workspace/assets/Isaac/Environments/Simple_Warehouse
          AWS_BASE="https://omniverse-content-production.s3-us-west-2.amazonaws.com"

          mirror_dir() {
            local prefix="$1" dest_root="$2" listing="/tmp/$(echo "$prefix" | tr / _).xml"
            echo "[assets] mirroring ${prefix}"
            curl -fsSL "${AWS_BASE}/?list-type=2&prefix=${prefix}" -o "${listing}" || return 1
            local keys=$(grep -oE "<Key>[^<]+</Key>" "${listing}" | sed -E "s|</?Key>||g")
            for key in ${keys}; do
              local rel="${key#${prefix}}"
              local dest="${dest_root}/${rel}"
              mkdir -p "$(dirname "${dest}")"
              curl -fsSL "${AWS_BASE}/${key}" -o "${dest}" 2>/dev/null \
                && echo "[assets]   OK  ${rel}" \
                || echo "[assets]   ERR ${rel}"
            done
          }
          mirror_dir "Assets/Isaac/4.5/Isaac/Environments/Simple_Warehouse/" \
                    "/workspace/assets/Isaac/Environments/Simple_Warehouse"
          export WAREHOUSE_USD_PATH="$(find /workspace/assets/Isaac/Environments/Simple_Warehouse -name '*.usd' 2>/dev/null | head -1)"
          echo "[assets] WAREHOUSE_USD_PATH=${WAREHOUSE_USD_PATH:-NOT FOUND}"
          
          # 1) Mirror the entire Forklift directory so USD's sibling refs (textures,
          #    child USDs) resolve via relative paths.
          curl -fsSL "${AWS_BASE}/?list-type=2&prefix=Assets/Isaac/4.5/Isaac/Robots/Forklift/" \
              -o /tmp/forklift_listing.xml || true
          if [[ -s /tmp/forklift_listing.xml ]]; then
            keys=$(grep -oE "<Key>[^<]+</Key>" /tmp/forklift_listing.xml | sed -E "s|</?Key>||g")
            n=$(echo "${keys}" | wc -l)
            echo "[forklift] mirroring ${n} files from Forklift dir"
            for key in ${keys}; do
              rel="${key#Assets/Isaac/4.5/Isaac/Robots/Forklift/}"
              dest="/workspace/assets/Isaac/Robots/Forklift/${rel}"
              mkdir -p "$(dirname "${dest}")"
              curl -fsSL "${AWS_BASE}/${key}" -o "${dest}" 2>/dev/null && \
                echo "[forklift]   OK  ${rel}" || \
                echo "[forklift]   ERR ${rel}"
            done
          fi
          # 2) Fallback: at minimum grab forklift_b.usd directly
          if [[ ! -s /workspace/assets/Isaac/Robots/Forklift/forklift_b.usd ]]; then
            curl -fsSL "${AWS_BASE}/Assets/Isaac/4.5/Isaac/Robots/Forklift/forklift_b.usd" \
              -o /workspace/assets/Isaac/Robots/Forklift/forklift_b.usd || true
          fi
          if [[ -s /workspace/assets/Isaac/Robots/Forklift/forklift_b.usd ]]; then
            export FORKLIFT_USD_PATH="/workspace/assets/Isaac/Robots/Forklift/forklift_b.usd"
            ls -la "${FORKLIFT_USD_PATH}"
          fi
          if [[ -z "${FORKLIFT_USD_PATH:-}" ]]; then
            echo "[forklift] FATAL: could not download forklift USD from any mirror"
            exit 1
          fi
          echo "[forklift] using ${FORKLIFT_USD_PATH}"

          echo "=== Stage 3: Forklift nav eval (base + finetuned, single W&B run) ==="
          nvidia-smi -L | head -10
          export OMNI_KIT_ACCEPT_EULA=YES ACCEPT_EULA=Y PRIVACY_CONSENT=Y
          export PYTHONPATH="/scripts${PYTHONPATH:+:${PYTHONPATH}}"
          ISAACLAB_SH=/workspace/isaaclab/isaaclab.sh
          ISAAC_PY=/workspace/isaaclab/_isaac_sim/python.sh

          "${ISAAC_PY}" -m pip install --no-cache-dir -q \
            grpcio==1.66.2 gymnasium==1.2.1 imageio==2.34.1 imageio-ffmpeg==0.4.9

          echo "[sim] starting Forklift sim server on :${SIM_RPC_PORT}"
          ISAAC_TASK=Isaac-Forklift-Nav-v0 \
            "${ISAACLAB_SH}" -p /scripts/sim_server.py > "${OUT}/sim.log" 2>&1 &
          SIM_PID=$!

          # GR00T policy venv (separate from Isaac Sim python)
          apt-get update -y && apt-get install -y --no-install-recommends \
            python3 python3-venv python3-dev git ffmpeg ca-certificates curl
          rm -rf /var/lib/apt/lists/*
          python3 -m venv /opt/groot-venv
          source /opt/groot-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir torch==2.7.1 torchvision==0.22.1 \
            --index-url https://download.pytorch.org/whl/cu128
          python -m pip install --no-cache-dir \
            transformers==4.51.3 accelerate==0.33.0 safetensors==0.4.5 \
            grpcio==1.66.2 numpy==1.26.4 imageio imageio-ffmpeg \
            albumentations==1.4.18 diffusers==0.35.1 dm-tree==0.1.8 \
            datasets==3.6.0 peft==0.17.1 msgpack==1.1.0 msgpack-numpy==0.4.8 \
            omegaconf==2.3.0 tyro==0.9.17 einops scipy termcolor av huggingface_hub \
            wandb==0.25.0 lmdb pyarrow
          if [[ ! -d /workspace/Isaac-GR00T ]]; then
            git clone --depth 1 --branch n1.6-release https://github.com/NVIDIA/Isaac-GR00T /workspace/Isaac-GR00T
          fi
          python -m pip install --no-deps -e /workspace/Isaac-GR00T
          export PYTHONPATH="/workspace/Isaac-GR00T:/scripts${PYTHONPATH:+:${PYTHONPATH}}"
          python /scripts/install_flash_attn_stub.py
          python /scripts/patch_eagle_for_sdpa.py
          cp /scripts/av_vehicle_config.py /workspace/Isaac-GR00T/av_vehicle_config.py

          if ! python /scripts/wait_for_sim.py; then
            echo "[sim] FAILED — sim.log tail:"
            tail -n 200 "${OUT}/sim.log" 2>/dev/null || echo "(empty)"
            exit 1
          fi

          # PYTHONOPTIMIZE=1 strips all `assert` statements at bytecode-compile time,
          # including the modeling_eagle3_vl.py Qwen3 assertion that we can't reliably
          # disarm via monkey-patching (transformers config setter coerces the
          # _attn_implementation attribute back).
          PYTHONOPTIMIZE=1 python /scripts/eval_runner.py

          kill ${SIM_PID} 2>/dev/null || true
          wait ${SIM_PID} 2>/dev/null || true
          echo "=== Stage 3 done ==="
