version: 2
# ============================================================================
# AV Pipeline ROBUST: 100 Cosmos samples + bigger finetune + factory env + driveable forklift
# ============================================================================
#
# Real production pipeline. No mock/passthrough/alias fallbacks — each stage
# either runs the real backend or fails loudly so the failure is visible.
#
# Stages:
#   1. cosmos-gen      Real Cosmos-Predict2 inference, LeRobot v2 dataset out
#   2. groot-finetune  Real GR00T N1.6-3B finetune on the cosmos dataset
#                       (NGC PyTorch image — native Blackwell sm_120 support)
#   3. av-eval         Forklift nav in Isaac Lab — base + finetuned policies
#                       in ONE consolidated task (single W&B run)
#
# W&B runs (project=osmo-workflow, 3 total — lineage chain):
#   cosmos-gen-<ts>       produces dataset artifact `av-cosmos-scenes`
#   groot-finetune-<ts>   uses cosmos artifact, logs training loss/lr/grad_norm
#                         via HF Trainer's W&B integration, produces model
#                         artifact `groot-av-finetuned`
#   av-eval-<ts>          uses finetuned-model artifact, logs base + finetuned
#                         eval videos + summary metrics + comparison table
#
# Setup:
#   osmo credential set workflow-secrets --type GENERIC --payload \
#     HF_TOKEN=hf_xxx NGC_API_KEY=nvapi-xxx \
#     WANDB_API_KEY=xxx WANDB_ENTITY=your-entity
#
# Submit:
#   osmo workflow submit av-pipeline.yaml --pool default
# ============================================================================

workflow:
  name: av-pipeline-robust
  resources:
    gpu8:
      platform: gpu
      gpu: 8
      cpu: 64
      memory: 384Gi
      storage: 500Gi
    eval-gpu:
      platform: gpu
      gpu: 2
      cpu: 32
      memory: 128Gi
      storage: 200Gi

  groups:

  # ==========================================================================
  # Stage 1: Cosmos scene generation (REAL — no mock)
  # ==========================================================================
  - name: cosmos-gen-group
    tasks:
    - name: cosmos-gen
      lead: true
      resource: gpu8
      image: nvcr.io/nvidia/cosmos/cosmos-predict2-container:1.2
      command: [bash]
      args: [/scripts/run.sh]
      credentials:
        workflow-secrets:
          HF_TOKEN: HF_TOKEN
          NGC_API_KEY: NGC_API_KEY
          WANDB_API_KEY: WANDB_API_KEY
          WANDB_ENTITY: WANDB_ENTITY
      files:
