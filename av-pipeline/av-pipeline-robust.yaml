      - path: /scripts/generate.py
        contents: |
          """Real Cosmos-Predict2 inference, PARALLEL across 8 GPUs.

          NO MOCK FALLBACK. If we can't find a working Cosmos inference CLI in
          the container, the script exits with rc=2 so the workflow fails loudly.
          """
          import json, os, math, importlib, subprocess, sys, shutil
          from pathlib import Path
          import numpy as np
          import pyarrow as pa, pyarrow.parquet as pq

          OUT = Path(os.environ["OUT"])
          fps = int(os.environ.get("FPS", 10))
          secs = int(os.environ.get("SECONDS_PER_CLIP", 4))
          frames_per = fps * secs
          H = int(os.environ.get("HEIGHT", 480))
          W = int(os.environ.get("WIDTH", 640))
          PROMPTS = json.load(open("/scripts/prompts.json"))

          data_dir   = OUT / "data" / "chunk-000"
          video_dir  = OUT / "videos" / "chunk-000" / "observation.images.front_camera"
          meta       = OUT / "meta"
          for d in (data_dir, video_dir, meta): d.mkdir(parents=True, exist_ok=True)

          # ---- Probe what Cosmos API is actually shipped ----
          probe = subprocess.run(["pip", "list"], capture_output=True, text=True).stdout
          cosmos_lines = [l for l in probe.splitlines() if "cosmos" in l.lower()]
          print(f"[probe] cosmos pip packages:\n  " + "\n  ".join(cosmos_lines), flush=True)
          for m in ("cosmos_predict2", "cosmos_predict2.diffusion",
                    "cosmos_predict2.diffusion.inference", "cosmos"):
              try: importlib.import_module(m); print(f"[probe] importable: {m}", flush=True)
              except Exception as e: print(f"[probe] miss {m}: {type(e).__name__}", flush=True)

          # ---- Find a working video-generation CLI / script ----
          # Prefer text2video > text2world > video2world (skip text2image — we need videos).
          import glob
          ex_dir = "/workspace/cosmos-predict2/examples"
          scripts_by_kind = {"text2video": [], "text2world": [], "video2world": [], "other": []}
          for s in glob.glob(f"{ex_dir}/*.py"):
              name = Path(s).stem.lower()
              if "text2video" in name or name.endswith("text2video"): scripts_by_kind["text2video"].append(s)
              elif "text2world" in name: scripts_by_kind["text2world"].append(s)
              elif "video2world" in name: scripts_by_kind["video2world"].append(s)
              elif "text2image" not in name and not name.startswith("_"):
                  scripts_by_kind["other"].append(s)

          working_cmd = None; help_text = ""
          for kind in ("text2video", "text2world", "video2world", "other"):
              for s in scripts_by_kind[kind]:
                  r = subprocess.run(["python", s, "--help"], capture_output=True, text=True, timeout=60)
                  if "usage" in (r.stdout + r.stderr).lower():
                      working_cmd = ["python", s]
                      help_text = r.stdout + r.stderr
                      print(f"[gen] using {kind} script: {s}", flush=True)
                      break
              if working_cmd: break

          if working_cmd is None:
              print("[gen] FATAL: no Cosmos video-gen script found.", flush=True)
              print(f"[gen] examples/ contents:")
              for d in glob.glob(f"{ex_dir}/*"): print(f"  {d}")
              sys.exit(2)

          print(f"[gen] --- script help ---\n{help_text[:3000]}\n--- end help ---", flush=True)

          # Parse help to learn the real arg names. Cosmos-Predict2 example scripts
          # use --prompt / --save_path / --seed / --model_size / optionally --num_steps.
          def has_arg(name):
              return f"--{name}" in help_text

          MODEL_SIZE = os.environ.get("COSMOS_MODEL_SIZE", "2B")
          NUM_STEPS  = int(os.environ.get("COSMOS_NUM_STEPS", "30"))

          import imageio.v2 as imageio

          # ROBUST: parallelize across all visible GPUs. Each prompt runs in a
          # subprocess pinned to one GPU via CUDA_VISIBLE_DEVICES. Threads (not
          # processes) so spawning workers doesn't recursively re-execute this
          # script — we already saw spawn-context ProcessPoolExecutor blow up
          # in av-pipeline-robust-1: workers re-ran the top-level probe and
          # then tried to start their own pools, hitting RuntimeError.
          import torch as _torch
          NUM_GPUS = _torch.cuda.device_count() or 1
          print(f"[gen] parallel mode: {NUM_GPUS} GPU workers (thread pool)", flush=True)

          def _gen_one(gpu_id, prompt_dict, cmd_template, fps, frames_per, H, W,
                        data_dir_str, video_dir_str, task_to_idx_dict):
              import os as _os, subprocess as _sp, shutil as _shutil, math as _math
              import numpy as _np, pyarrow as _pa, pyarrow.parquet as _pq
              from pathlib import Path as _Path
              env = {**_os.environ, "CUDA_VISIBLE_DEVICES": str(gpu_id)}
              eid = prompt_dict["id"]; text = prompt_dict["text"]
              video_dir = _Path(video_dir_str); data_dir = _Path(data_dir_str)
              vpath = video_dir / f"episode_{eid:06d}.mp4"
              ppath = data_dir  / f"episode_{eid:06d}.parquet"
              if vpath.exists() and ppath.exists(): return (eid, True, "cached")
              save_path = f"/tmp/cosmos_ep_{eid:06d}_gpu{gpu_id}.mp4"
              cmd = cmd_template[:]
              cmd += ["--prompt", text, "--save_path", save_path, "--seed", str(eid),
                      "--model_size", "2B", "--disable_guardrail",
                      "--disable_prompt_refiner", "--fps", str(fps)]
              rc = _sp.run(cmd, env=env, capture_output=True, text=True).returncode
              produced = _Path(save_path) if _Path(save_path).exists() and _Path(save_path).stat().st_size > 0 else None
              if rc != 0 or produced is None:
                  return (eid, False, f"rc={rc}")
              # Re-encode to H.264 yuv420p for GR00T video loader compat
              tmp_mp4 = str(vpath) + ".tmp.mp4"
              re_rc = _sp.run(["ffmpeg","-y","-v","error","-i",str(produced),
                               "-c:v","libx264","-profile:v","high","-level","4.0",
                               "-pix_fmt","yuv420p","-preset","fast","-crf","22",
                               "-r",str(fps),"-an","-movflags","+faststart", tmp_mp4],
                              capture_output=True, text=True).returncode
              if re_rc == 0 and _Path(tmp_mp4).exists():
                  _os.replace(tmp_mp4, str(vpath)); produced.unlink(missing_ok=True)
              else:
                  _shutil.move(str(produced), str(vpath))
              # Synthetic trajectory matching the video length
              rng = _np.random.default_rng(eid)
              x = y = heading = 0.0; speed = 0.8 + 0.4*float(rng.uniform())
              states = _np.zeros((frames_per, 4), dtype=_np.float32)
              actions = _np.zeros((frames_per, 3), dtype=_np.float32)
              for f in range(frames_per):
                  t = f / fps
                  steer = 0.15 * _math.sin(2*_math.pi*t/2.0 + eid)
                  throttle = 0.6 + 0.2*_math.sin(t)
                  heading += steer * 0.05
                  x += speed * _math.cos(heading) / fps
                  y += speed * _math.sin(heading) / fps
                  states[f] = (x, y, heading, speed); actions[f] = (steer, throttle, 0.0)
              tbl = _pa.table({
                  "observation.state": _pa.array(list(states), type=_pa.list_(_pa.float32(), 4)),
                  "action":            _pa.array(list(actions), type=_pa.list_(_pa.float32(), 3)),
                  "timestamp":   _pa.array([f/fps for f in range(frames_per)], type=_pa.float32()),
                  "frame_index": _pa.array(list(range(frames_per)), type=_pa.int64()),
                  "episode_index": _pa.array([eid]*frames_per, type=_pa.int64()),
                  "index":       _pa.array([eid*frames_per + f for f in range(frames_per)], type=_pa.int64()),
                  "task_index":  _pa.array([task_to_idx_dict[text]]*frames_per, type=_pa.int64()),
                  "next.done":   _pa.array([(f == frames_per-1) for f in range(frames_per)], type=_pa.bool_()),
                  "next.reward": _pa.array([0.0]*frames_per, type=_pa.float32()),
              })
              _pq.write_table(tbl, str(ppath))
              return (eid, True, "ok")

          task_to_idx = {p["text"]: i for i, p in enumerate(PROMPTS)}
          n_done = n_real = n_failed = 0
          from concurrent.futures import ThreadPoolExecutor, as_completed
          with ThreadPoolExecutor(max_workers=NUM_GPUS) as ex:
              futures = []
              for i, p in enumerate(PROMPTS):
                  gpu = i % NUM_GPUS
                  futures.append(ex.submit(_gen_one, gpu, p, list(working_cmd), fps,
                                            frames_per, H, W, str(data_dir), str(video_dir),
                                            task_to_idx))
              for fut in as_completed(futures):
                  eid, ok, msg = fut.result()
                  if ok:
                      n_done += 1
                      if msg != "cached": n_real += 1
                      print(f"[gen] {n_done}/{len(PROMPTS)} done (ep {eid}: {msg})", flush=True)
                  else:
                      n_failed += 1
                      print(f"[gen] ep {eid} FAILED: {msg}", flush=True)
          print(f"[gen] summary: {n_done} ok, {n_failed} failed", flush=True)

          info = {
              "codebase_version": "v2.0", "robot_type": "av_vehicle",
              "total_episodes": n_done, "total_frames": n_done * frames_per,
              "total_tasks": len({p["text"] for p in PROMPTS[:n_done]}),
              "total_videos": n_done, "total_chunks": 1, "chunks_size": 1000, "fps": fps,
              "splits": {"train": f"0:{n_done}"},
              "data_path": "data/chunk-{episode_chunk:03d}/episode_{episode_index:06d}.parquet",
              "video_path": "videos/chunk-{episode_chunk:03d}/{video_key}/episode_{episode_index:06d}.mp4",
              "features": {
                  "observation.state": {"dtype": "float32", "shape": [4], "names": ["x","y","heading","speed"]},
                  "action":            {"dtype": "float32", "shape": [3], "names": ["steer","throttle","brake"]},
                  "observation.images.front_camera": {"dtype": "video", "shape": [H, W, 3], "names": ["height","width","channel"],
                      "info": {"video.fps": fps, "video.height": H, "video.width": W, "video.codec": "av1", "video.pix_fmt": "yuv420p", "video.is_depth_map": False, "has_audio": False}},
                  "timestamp": {"dtype": "float32", "shape": [1], "names": None},
                  "frame_index": {"dtype": "int64", "shape": [1], "names": None},
                  "episode_index": {"dtype": "int64", "shape": [1], "names": None},
                  "index": {"dtype": "int64", "shape": [1], "names": None},
                  "task_index": {"dtype": "int64", "shape": [1], "names": None},
                  "next.done": {"dtype": "bool", "shape": [1], "names": None},
                  "next.reward": {"dtype": "float32", "shape": [1], "names": None},
              },
          }
          json.dump(info, open(meta/"info.json","w"), indent=2)
          with open(meta/"episodes.jsonl","w") as f:
              for p in PROMPTS[:n_done]:
                  f.write(json.dumps({"episode_index": p["id"], "tasks": [p["text"]], "length": frames_per}) + "\n")
          with open(meta/"tasks.jsonl","w") as f:
              for t, i in task_to_idx.items():
                  f.write(json.dumps({"task_index": i, "task": t}) + "\n")
          json.dump({
              "video": {"front_camera": {"original_key": "observation.images.front_camera"}},
              "state": {"vehicle_state": {"start": 0, "end": 4, "original_key": "observation.state"}},
              "action": {"vehicle_control": {"start": 0, "end": 3, "original_key": "action"}},
              "annotation": {"human.task_description": {"original_key": "task_index"}},
          }, open(meta/"modality.json","w"), indent=2)
          json.dump({"total_episodes": n_done, "fps": fps, "frames_per_episode": frames_per},
                    open(OUT/"manifest.json","w"), indent=2)
          print(f"[gen] {n_done} REAL cosmos episodes -> {OUT}", flush=True)
      - path: /scripts/log_to_wandb.py
        contents: |
          """Log dataset as W&B artifact (producer of cosmos->finetune edge)."""
          import json, os, time
          from pathlib import Path
          import wandb
          OUT = Path(os.environ["OUT"])
          info = json.load(open(OUT/"meta/info.json"))
          run = wandb.init(
              entity=os.environ.get("WANDB_ENTITY"),
              project=os.environ.get("WANDB_PROJECT", "osmo-workflow"),
              name=f"cosmos-gen-{time.strftime('%m%d-%H%M')}",
              job_type="cosmos-gen",
              tags=["av-pipeline","stage-1-cosmos"],
              config={"stage": "1-cosmos", "fps": info["fps"],
                      "total_episodes": info["total_episodes"]},
          )
          art = wandb.Artifact(
              name="av-cosmos-scenes",
              type="dataset",
              description="Cosmos-Predict2-generated AV driving scenes (LeRobot v2)",
              metadata={"total_episodes": info["total_episodes"],
                        "total_frames": info["total_frames"], "fps": info["fps"]},
          )
          art.add_dir(str(OUT), name="dataset")
          run.log_artifact(art).wait()
          # Preview a few videos directly in the run
          vids = sorted((OUT/"videos/chunk-000/observation.images.front_camera").glob("episode_*.mp4"))[:3]
          for i, v in enumerate(vids):
              run.log({f"cosmos/preview_{i}": wandb.Video(str(v), fps=info["fps"], format="mp4", caption=v.name)})
          run.summary["dataset_artifact"] = f"{run.entity}/{run.project}/av-cosmos-scenes:latest"
          run.finish()
          print(f"[wandb] cosmos artifact logged: {run.entity}/{run.project}/av-cosmos-scenes:latest")
      - path: /scripts/run.sh
        contents: |
          #!/usr/bin/env bash
          set -euo pipefail
          export FPS="${FPS:-10}"
          export SECONDS_PER_CLIP="${SECONDS_PER_CLIP:-4}"
          export HEIGHT="${HEIGHT:-480}"
          export WIDTH="${WIDTH:-640}"
          export WANDB_PROJECT="${WANDB_PROJECT:-osmo-workflow}"
          export OUT="{{output}}"
          mkdir -p "${OUT}"

          echo "=== Stage 1: Cosmos generation (REAL, no mock) ==="
          nvidia-smi -L | head -10

          # HF + NGC auth
          if [[ -n "${HF_TOKEN:-}" ]]; then
            python3 -c "from huggingface_hub import login; import os; login(os.environ['HF_TOKEN'])" || true
          fi
          if [[ -n "${NGC_API_KEY:-}" ]]; then
            mkdir -p ~/.ngc && printf "apikey = %s\n" "${NGC_API_KEY}" > ~/.ngc/config
          fi

          # Ensure ffmpeg is installed for the post-cosmos re-encode step
          if ! command -v ffmpeg >/dev/null; then
            apt-get update -y >/dev/null 2>&1 || true
            apt-get install -y --no-install-recommends ffmpeg >/dev/null 2>&1 || true
          fi
          ffmpeg -version 2>/dev/null | head -1 || echo "[warn] ffmpeg not available"
          python3 -m pip install --quiet --no-cache-dir pyarrow imageio imageio-ffmpeg wandb numpy huggingface_hub 2>&1 | tail -3 || true

          # ---- Probe container layout to see what is already installed ----
          echo "[probe] /workspace contents:"
          ls -la /workspace 2>/dev/null | head -30 || echo "  (no /workspace)"
          echo "[probe] /opt/cosmos* contents:"
          ls -la /opt/cosmos* 2>/dev/null | head -10 || echo "  (none)"
          echo "[probe] cosmos packages on pip:"
          pip list 2>/dev/null | grep -i cosmos || echo "  (none)"
          echo "[probe] python -c 'import cosmos_predict2':"
          python3 -c "import cosmos_predict2; print(cosmos_predict2.__file__)" 2>&1 || true

          # ---- Install cosmos-predict2 from GitHub if not present ----
          if ! python3 -c "import cosmos_predict2" 2>/dev/null; then
              echo "[install] cosmos_predict2 missing — cloning from GitHub"
              cd /workspace
              for repo in \
                  "https://github.com/nvidia-cosmos/cosmos-predict2.git" \
                  "https://github.com/NVIDIA/Cosmos-Predict2.git" \
                  "https://github.com/NVIDIA/Cosmos.git"
              do
                  echo "[install] trying ${repo}"
                  git clone --depth 1 "${repo}" /workspace/cosmos-predict2 2>&1 | tail -3 && break
              done
              if [[ ! -d /workspace/cosmos-predict2 ]]; then
                  echo "[install] FATAL: could not clone any cosmos-predict2 repo"; exit 4
              fi
              cd /workspace/cosmos-predict2
              ls -la | head -20
              # Try requirements then editable install
              if [[ -f requirements.txt ]]; then
                  pip install --no-cache-dir -r requirements.txt 2>&1 | tail -10 || true
              fi
              pip install --no-cache-dir -e . 2>&1 | tail -10 || pip install --no-cache-dir -e ./cosmos_predict2 2>&1 | tail -10 || true
              echo "[install] post-install probe:"
              python3 -c "import cosmos_predict2; print('installed at', cosmos_predict2.__file__)" 2>&1 || true
              # Also expose any inference modules at PYTHONPATH
              export PYTHONPATH="/workspace/cosmos-predict2:${PYTHONPATH:-}"
          fi

          # ---- Download Cosmos-Predict2 weights from HF ----
          # text2world internally chains text2image + video2world, so we need BOTH.
          # Real repo names confirmed from a real run: nvidia/Cosmos-Predict2-{SIZE}-{COMPONENT}
          export COSMOS_MODEL_SIZE="${COSMOS_MODEL_SIZE:-2B}"
          export COSMOS_NUM_STEPS="${COSMOS_NUM_STEPS:-30}"
          mkdir -p /workspace/cosmos-predict2/checkpoints/nvidia
          # Use hf_transfer (multi-thread parallel) for 5-10x faster downloads
          pip install --quiet --no-cache-dir hf_transfer 2>&1 | tail -2 || true
          export HF_HUB_ENABLE_HF_TRANSFER=1
          export HF_HUB_DOWNLOAD_TIMEOUT=120

          download_hf() {
            local ref="$1" dest="$2" timeout_s="${3:-1800}"   # 30 min default per model
            if [[ -d "${dest}" && -n "$(ls -A "${dest}" 2>/dev/null)" ]]; then
              echo "[hf] ${ref} already at ${dest}, skipping"
              return 0
            fi
            echo "[hf] fetching ${ref} -> ${dest} (timeout=${timeout_s}s)"
            # `timeout` kills the download if it hangs, so we fail fast instead of waiting forever
            if ! timeout "${timeout_s}" huggingface-cli download "${ref}" \
                --local-dir "${dest}" --token "${HF_TOKEN}" \
                --max-workers 16 2>&1 | tail -5; then
              local rc=$?
              if [[ $rc -eq 124 ]]; then
                echo "[hf] FATAL: download of ${ref} TIMED OUT after ${timeout_s}s — HF endpoint may be slow"
              else
                echo "[hf] FATAL: download of ${ref} failed (rc=${rc}). If gated, request access at https://huggingface.co/${ref}"
              fi
              return 5
            fi
            return 0
          }

          # Cosmos-Predict2 model weights (gated; both required by text2world)
          for component in Text2Image Video2World; do
            download_hf "nvidia/Cosmos-Predict2-${COSMOS_MODEL_SIZE}-${component}" \
              "/workspace/cosmos-predict2/checkpoints/nvidia/Cosmos-Predict2-${COSMOS_MODEL_SIZE}-${component}"
          done

          # T5 text encoder Cosmos uses to embed prompts (public HF, ~45GB)
          download_hf "google-t5/t5-11b" "/workspace/cosmos-predict2/checkpoints/google-t5/t5-11b"
          # Cosmos-Reason1 VLM (used by video2world's prompt refiner; may be gated)
          # We pass --disable_prompt_refiner to skip its inference path, but the
          # constructor still loads weights — so download regardless.
          if ! download_hf "nvidia/Cosmos-Reason1-7B" "/workspace/cosmos-predict2/checkpoints/nvidia/Cosmos-Reason1-7B"; then
              echo "[hf] WARNING: could not download Cosmos-Reason1-7B (may be gated). Continuing — --disable_prompt_refiner may still let us through."
          fi

          echo "[hf] checkpoints/:"
          ls /workspace/cosmos-predict2/checkpoints/ | head -10
          du -sh /workspace/cosmos-predict2/checkpoints/* 2>/dev/null | head -10

          # Run generation from the cosmos-predict2 dir so that the script's
          # default `checkpoints/...` relative paths resolve.
          cd /workspace/cosmos-predict2
          python3 /scripts/generate.py
          python3 /scripts/log_to_wandb.py
          echo "=== Stage 1 done ==="

  # ==========================================================================
  # Stage 2: GR00T finetune (REAL — NGC PyTorch with Blackwell sm_120 native)
  # ==========================================================================
  - name: groot-finetune-group
    tasks:
    - name: groot-finetune
      lead: true
      resource: gpu8
      inputs:
      - task: cosmos-gen
      # NGC PyTorch image: ships torch + cuda + flash-attn + apex pre-built for
      # the GPU generation released at that time. 25.05 (May 2025) has native
      # Blackwell sm_120 support that the bare `nvidia/cuda:12.4.1` image lacked.
      image: nvcr.io/nvidia/pytorch:25.05-py3
      command: [bash]
      args: [/scripts/run.sh]
      credentials:
        workflow-secrets:
          HF_TOKEN: HF_TOKEN
          WANDB_API_KEY: WANDB_API_KEY
          WANDB_ENTITY: WANDB_ENTITY
      files:
      - path: /scripts/av_vehicle_config.py
        contents: |
          """Vehicle NEW_EMBODIMENT modality config for GR00T."""
          from gr00t.configs.data.embodiment_configs import register_modality_config
          from gr00t.data.embodiment_tags import EmbodimentTag
          from gr00t.data.types import (
              ActionConfig, ActionFormat, ActionRepresentation, ActionType, ModalityConfig)
          av_vehicle_config = {
              "video":    ModalityConfig(delta_indices=[0], modality_keys=["front_camera"]),
              "state":    ModalityConfig(delta_indices=[0], modality_keys=["vehicle_state"]),
              "action":   ModalityConfig(
                  delta_indices=list(range(16)),
                  modality_keys=["vehicle_control"],
                  action_configs=[ActionConfig(rep=ActionRepresentation.ABSOLUTE,
                      type=ActionType.NON_EEF, format=ActionFormat.DEFAULT)]),
              "language": ModalityConfig(delta_indices=[0],
                  modality_keys=["annotation.human.task_description"]),
          }
          register_modality_config(av_vehicle_config, embodiment_tag=EmbodimentTag.NEW_EMBODIMENT)
      - path: /scripts/init_wandb.py
        contents: |
          """Initialize the finetune W&B run; pull cosmos dataset artifact for lineage."""
          import os, time
          from pathlib import Path
          import wandb
          run = wandb.init(
              entity=os.environ.get("WANDB_ENTITY"),
              project=os.environ["WANDB_PROJECT"],
              name=os.environ.get("WANDB_NAME", "Gr00t-Finetuning"),
              job_type="finetune",
              tags=["av-pipeline","stage-2-finetune"],
              config={
                  "stage": "2-finetune",
                  "base_model": os.environ["BASE_MODEL"],
                  "max_steps": int(os.environ.get("MAX_STEPS", 100)),
                  "learning_rate": float(os.environ.get("LEARNING_RATE", 1e-4)),
                  "grad_accum_steps": int(os.environ.get("GRAD_ACCUM", 1)),
                  "global_batch_size": int(os.environ.get("GLOBAL_BATCH_SIZE", 8)),
                  "embodiment_tag": os.environ["EMBODIMENT_TAG"],
              },
              resume="allow",
          )
          # LINEAGE: consume cosmos dataset artifact
          try:
              art = run.use_artifact(
                  f"{os.environ.get('WANDB_ENTITY')}/{os.environ['WANDB_PROJECT']}/av-cosmos-scenes:latest",
                  type="dataset",
              )
              print(f"[wandb] linked input artifact: {art.qualified_name}")
          except Exception as e:
              print(f"[wandb] could not link cosmos artifact: {e}")
          Path("/tmp/wandb_run_id").write_text(run.id)
          print(f"[wandb] finetune run id={run.id}")
          run.finish()  # HF Trainer will resume via WANDB_RUN_ID + WANDB_RESUME=allow
      - path: /scripts/log_model_artifact.py
        contents: |
          """After training: resume the finetune run, log the model artifact."""
          import json, os
          from pathlib import Path
          import wandb
          OUT = Path(os.environ["OUT"])
          rid = Path("/tmp/wandb_run_id").read_text().strip()
          run = wandb.init(entity=os.environ.get("WANDB_ENTITY"),
              project=os.environ["WANDB_PROJECT"], id=rid, resume="must")
          metrics_file = OUT / "metrics.json"
          if metrics_file.exists():
              metrics = json.load(open(metrics_file))
              for k, v in metrics.items():
                  if isinstance(v, (int, float)): run.summary[k] = v
          art = wandb.Artifact(
              name="groot-av-finetuned", type="model",
              description="GR00T N1.6-3B finetuned on Cosmos AV scenes",
              metadata={"base_model": os.environ["BASE_MODEL"],
                        "max_steps": int(os.environ.get("MAX_STEPS", 100)),
                        "learning_rate": float(os.environ.get("LEARNING_RATE", 1e-4))},
          )
          art.add_dir(str(OUT / "checkpoint-final"), name="model")
          if (OUT/"train.log").exists(): wandb.save(str(OUT/"train.log"), policy="now")
          run.log_artifact(art).wait()
          run.summary["finetuned_artifact"] = f"{run.entity}/{run.project}/groot-av-finetuned:latest"
          run.finish()
          print(f"[wandb] finetuned model artifact logged")
      - path: /scripts/run.sh
        contents: |
          #!/usr/bin/env bash
          set -euo pipefail

          export BASE_MODEL="${BASE_MODEL:-nvidia/GR00T-N1.6-3B}"
          export EMBODIMENT_TAG="${EMBODIMENT_TAG:-NEW_EMBODIMENT}"
          export MAX_STEPS="${MAX_STEPS:-2000}"
          export LEARNING_RATE="${LEARNING_RATE:-5e-5}"
          export GRAD_ACCUM="${GRAD_ACCUM:-8}"
          export SAVE_STEPS="${SAVE_STEPS:-500}"
          export GLOBAL_BATCH_SIZE="${GLOBAL_BATCH_SIZE:-32}"
          export WANDB_PROJECT="${WANDB_PROJECT:-osmo-workflow}"
          export WANDB_NAME="Gr00t-Finetuning"
          export DATASET_ROOT="{{input:0}}"
          export OUT="{{output}}"
          mkdir -p "${OUT}/checkpoint-final"

          # Blackwell + NCCL stability
          export NCCL_P2P_DISABLE=1
          export NCCL_IB_DISABLE=1
          export NCCL_DEBUG=WARN
          export TORCH_NCCL_BLOCKING_WAIT=1

          echo "=== Stage 2: GR00T finetune (NGC PyTorch 25.05 — Blackwell native) ==="
          nvidia-smi -L | head -10
          NGPU=$(nvidia-smi -L | wc -l)
          echo "GPUs=${NGPU}  DATASET=${DATASET_ROOT}  OUT=${OUT}"
          ls "${DATASET_ROOT}" | head

          apt-get update -y >/dev/null 2>&1 || true
          apt-get install -y --no-install-recommends git ffmpeg ca-certificates curl >/dev/null 2>&1 || true

          # NGC image already has torch + flash-attn pre-built. Install just GR00T deps.
          pip install --no-cache-dir \
            wandb==0.25.0 \
            transformers==4.51.3 accelerate safetensors==0.4.5 \
            albumentations==1.4.18 diffusers==0.35.1 dm-tree==0.1.8 \
            datasets==3.6.0 peft==0.17.1 msgpack==1.1.0 msgpack-numpy==0.4.8 \
            omegaconf==2.3.0 tyro==0.9.17 \
            einops scipy termcolor lmdb av pyzmq click \
            huggingface_hub pyarrow \
            decord opencv-python-headless

          # We install torchcodec with --no-deps (so it doesn't drag in a second
          # torch alongside NGC's) but the C++ kernels often fail to register
          # against the NGC torch's ABI. Instead of monkey-patching via
          # sitecustomize (fragile), we directly patch GR00T's video_utils.py
          # to use a pyav-backed reader. This is applied right after the
          # Isaac-GR00T clone, before any of the training code imports it.
          pip install --no-cache-dir --no-deps "torchcodec==0.4.0" 2>&1 | tail -3 || true

          # The actual GR00T video_utils.py patch is applied after the git clone
          # below; we just verify decoders are at least installed here.
          python - <<'PY'
          import sys
          for m in ("av", "decord", "cv2"):
              try:
                  __import__(m); print(f"[video-backend] {m} present")
              except Exception as e:
                  print(f"[video-backend] {m} missing: {e}")
          PY

          # Verify flash-attn works on sm_120 (NGC image should ship with it)
          python - <<'PY' || true
          import importlib, torch
          try:
              fa = importlib.import_module("flash_attn")
              q = torch.randn(1, 4, 8, 16, device="cuda", dtype=torch.bfloat16)
              fa.flash_attn_func(q, q, q)
              print(f"[flash-attn] OK on sm_120 (version={getattr(fa, '__version__', '?')})")
          except Exception as e:
              print(f"[flash-attn] unusable: {type(e).__name__}: {e}")
              import os; os.environ.setdefault("TRANSFORMERS_ATTENTION_IMPLEMENTATION", "eager")
          PY

          if [[ ! -d /workspace/Isaac-GR00T ]]; then
            git clone --depth 1 --branch n1.6-release https://github.com/NVIDIA/Isaac-GR00T /workspace/Isaac-GR00T
          fi
          pip install --no-deps -e /workspace/Isaac-GR00T
          export PYTHONPATH="/workspace/Isaac-GR00T${PYTHONPATH:+:${PYTHONPATH}}"

          # Patches: WANDB project from env, device shim, DDP, grad checkpointing
          python - <<'PY'
          from pathlib import Path
          for f in Path("/workspace/Isaac-GR00T/gr00t").rglob("*.py"):
              try: c = f.read_text()
              except Exception: continue
              c2 = c.replace('"finetune-gr00t-n1d6"',
                  '__import__("os").environ.get("WANDB_PROJECT", "osmo-workflow")')
              if c2 != c: f.write_text(c2); print(f"[patch] wandb_project: {f}")
          shim = (
            "import os as _os, torch as _torch\n"
            "if _torch.cuda.is_available():\n"
            "    _lr = int(_os.environ.get('LOCAL_RANK', _os.environ.get('OMPI_COMM_WORLD_LOCAL_RANK', 0)))\n"
            "    _torch.cuda.set_device(_lr)\n"
            "    print(f'[device-shim] rank pinned to cuda:{_lr}', flush=True)\n"
          )
          p = Path("/workspace/Isaac-GR00T/gr00t/experiment/launch_finetune.py")
          c = p.read_text(); lines = c.split("\n"); ins = 0
          for i, ln in enumerate(lines):
              if ln.startswith("import ") or ln.startswith("from "): ins = i + 1
          lines.insert(ins, shim)
          p.write_text("\n".join(lines))
          p = Path("/workspace/Isaac-GR00T/gr00t/configs/training/training_config.py")
          c = p.read_text()
          c = c.replace('use_ddp: bool = False', 'use_ddp: bool = True')
          c = c.replace('gradient_checkpointing: bool = False', 'gradient_checkpointing: bool = True')
          p.write_text(c)
          print("[patch] applied launch_finetune + training_config")
          PY

          # Patch GR00T's video_utils.py: replace the torchcodec call with a pyav
          # call. Uses a sed-based delete-and-append approach so we don't have
          # to escape Python triple-quotes inside YAML.
          python - <<PY_PATCH
          import re
          from pathlib import Path
          src = Path("/workspace/Isaac-GR00T/gr00t/utils/video_utils.py").read_text()
          # Always prepend imports under unambiguous aliases (idempotent)
          import_block = "import av as _avlib\nimport torch as _torch\n"
          if "import av as _avlib" not in src:
              src = import_block + src
          # Replace any line containing torchcodec.decoders.VideoDecoder with a sentinel
          # we'll then handle inside a wrapper. Simplest: shadow VideoDecoder symbol.
          shim = "\n\nclass _AvVideoDecoder:\n"
          shim += "    def __init__(self, source, **kw):\n"
          shim += "        self._frames = []\n"
          shim += "        c = _avlib.open(str(source))\n"
          shim += "        s = c.streams.video[0]\n"
          shim += "        for f in c.decode(video=0):\n"
          shim += "            self._frames.append(_torch.from_numpy(f.to_ndarray(format='rgb24')))\n"
          shim += "        c.close()\n"
          shim += "        self.metadata = type('M', (), {'num_frames': len(self._frames),"
          shim += " 'duration_seconds': len(self._frames) / float(s.average_rate or 10),"
          shim += " 'average_fps': float(s.average_rate or 10),"
          shim += " 'height': s.height, 'width': s.width})()\n"
          shim += "    def __len__(self): return len(self._frames)\n"
          shim += "    def __getitem__(self, i):\n"
          shim += "        if isinstance(i, (list, tuple)) or hasattr(i, '__iter__'):\n"
          shim += "            return _torch.stack([self._frames[int(j)] for j in i])\n"
          shim += "        return self._frames[int(i)]\n"
          shim += "    def get_frames_at(self, indices):\n"
          shim += "        return _torch.stack([self._frames[int(j)] for j in indices])\n"
          shim += "import torchcodec.decoders as _tc_dec\n"
          shim += "_tc_dec.VideoDecoder = _AvVideoDecoder\n"
          if "_AvVideoDecoder" not in src:
              src = src + shim
          Path("/workspace/Isaac-GR00T/gr00t/utils/video_utils.py").write_text(src)
