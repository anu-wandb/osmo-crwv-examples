      - path: /scripts/forklift_nav_env_cfg.py
        contents: |
          """Forklift navigation env, Simple_Warehouse scene + drive/steer actions."""
          import os, glob, gymnasium as gym

          TASK_ID = "Isaac-Forklift-Nav-v0"

          def _find_forklift_usd():
              p = os.environ.get("FORKLIFT_USD_PATH")
              if p and os.path.exists(p): return p
              for pat in ("/workspace/assets/Isaac/Robots/Forklift/*.usd",
                          "/workspace/assets/Isaac/Props/Forklift/*.usd"):
                  for f in glob.glob(pat):
                      if "forklift" in f.lower(): return f
              return None

          USD_PATH = _find_forklift_usd()
          print(f"[env_cfg] Forklift USD: {USD_PATH or 'NOT FOUND'}", flush=True)
          if USD_PATH is None:
              raise RuntimeError("No Forklift USD found")

          WAREHOUSE_USD = os.environ.get("WAREHOUSE_USD_PATH", "")
          print(f"[env_cfg] Warehouse USD: {WAREHOUSE_USD or '(none — fallback ground plane)'}", flush=True)

          import isaaclab.sim as sim_utils
          from isaaclab.assets import ArticulationCfg, AssetBaseCfg
          from isaaclab.envs import ManagerBasedRLEnvCfg
          from isaaclab.managers import (ObservationGroupCfg, ObservationTermCfg,
              TerminationTermCfg, EventTermCfg, SceneEntityCfg)
          from isaaclab.scene import InteractiveSceneCfg
          from isaaclab.sensors import CameraCfg
          from isaaclab.utils import configclass
          import isaaclab.envs.mdp as mdp

          FORKLIFT_CFG = ArticulationCfg(
              spawn=sim_utils.UsdFileCfg(usd_path=USD_PATH),
              init_state=ArticulationCfg.InitialStateCfg(pos=(0.0, 0.0, 0.2)),
              actuators={},
          )

          @configclass
          class ForkliftNavSceneCfg(InteractiveSceneCfg):
              # Warehouse if USD found, else default ground plane
              if WAREHOUSE_USD:
                  warehouse = AssetBaseCfg(prim_path="/World/Warehouse",
                      spawn=sim_utils.UsdFileCfg(usd_path=WAREHOUSE_USD))
              else:
                  ground = AssetBaseCfg(prim_path="/World/ground",
                      spawn=sim_utils.GroundPlaneCfg())
              dome_light = AssetBaseCfg(prim_path="/World/DomeLight",
                  spawn=sim_utils.DomeLightCfg(color=(0.92,0.92,0.95), intensity=2500.0))
              goal = AssetBaseCfg(prim_path="{ENV_REGEX_NS}/Goal",
                  spawn=sim_utils.SphereCfg(radius=0.4,
                      rigid_props=sim_utils.RigidBodyPropertiesCfg(kinematic_enabled=True),
                      visual_material=sim_utils.PreviewSurfaceCfg(diffuse_color=(0.1,0.95,0.2))),
                  init_state=AssetBaseCfg.InitialStateCfg(pos=(8.0, 0.0, 0.4)))
              robot: ArticulationCfg = FORKLIFT_CFG.replace(prim_path="{ENV_REGEX_NS}/Robot")
              camera: CameraCfg = CameraCfg(
                  prim_path="{ENV_REGEX_NS}/Robot/ChaseCamera",
                  update_period=0.0, height=480, width=640, data_types=["rgb"],
                  spawn=sim_utils.PinholeCameraCfg(focal_length=12.0, focus_distance=400.0,
                      horizontal_aperture=20.955, clipping_range=(0.1, 1.0e4)),
                  offset=CameraCfg.OffsetCfg(pos=(-9.0, 0.0, 3.5),
                      rot=(0.574, 0.413, -0.413, -0.573), convention="opengl"))

          @configclass
          class ObservationsCfg:
              @configclass
              class PolicyCfg(ObservationGroupCfg):
                  joint_pos = ObservationTermCfg(func=mdp.joint_pos)
                  joint_vel = ObservationTermCfg(func=mdp.joint_vel_rel)
                  def __post_init__(self):
                      self.enable_corruption = False; self.concatenate_terms = True
              policy: PolicyCfg = PolicyCfg()

          @configclass
          class ActionsCfg:
              # DRIVE = rear wheel velocity (throttle - brake). Regex covers
              # NVIDIA forklift USD joint naming variants.
              drive = mdp.JointVelocityActionCfg(
                  asset_name="robot",
                  joint_names=[".*back.*wheel.*", ".*rear.*wheel.*", ".*drive.*wheel.*"],
                  scale=20.0,
                  use_default_offset=False,
              )
              # STEER = front rotator position. Regex covers naming variants.
              steer = mdp.JointPositionActionCfg(
                  asset_name="robot",
                  joint_names=[".*rotator.*", ".*steer.*", ".*front.*wheel.*joint.*"],
                  scale=0.5,
                  use_default_offset=False,
              )

          @configclass
          class RewardsCfg:
              pass

          @configclass
          class TerminationsCfg:
              time_out = TerminationTermCfg(func=mdp.time_out, time_out=True)

          @configclass
          class ForkliftNavEnvCfg(ManagerBasedRLEnvCfg):
              scene: ForkliftNavSceneCfg = ForkliftNavSceneCfg(num_envs=1, env_spacing=40.0)
              observations: ObservationsCfg = ObservationsCfg()
              actions: ActionsCfg = ActionsCfg()
              rewards: RewardsCfg = RewardsCfg()
              terminations: TerminationsCfg = TerminationsCfg()
              episode_length_s = 60.0
              def __post_init__(self):
                  self.sim.dt = 0.01; self.decimation = 5
                  self.sim.render_interval = self.decimation

          gym.register(id=TASK_ID,
              entry_point="isaaclab.envs:ManagerBasedRLEnv",
              disable_env_checker=True,
              kwargs={"env_cfg_entry_point": f"{__name__}:ForkliftNavEnvCfg"})
          print(f"[env_cfg] registered {TASK_ID} (warehouse={'yes' if WAREHOUSE_USD else 'no'}, drive+steer)", flush=True)
      - path: /scripts/sim_server.py
        contents: |
          """Isaac Lab gRPC sim server (Forklift nav variant)."""
          import os, sys, argparse
          from isaaclab.app import AppLauncher
          parser = argparse.ArgumentParser(); AppLauncher.add_app_launcher_args(parser)
          args = parser.parse_args(["--headless","--enable_cameras"])
          app_launcher = AppLauncher(args); simulation_app = app_launcher.app
          import time, pickle, threading, queue
          from concurrent import futures
          import numpy as np, grpc, gymnasium as gym, torch, warp as wp
          import isaaclab_tasks  # noqa: F401
          # CRITICAL: registering Forklift env MUST succeed or we exit early
          import forklift_nav_env_cfg  # noqa: F401  (raises if no USD found)
          from isaaclab_tasks.utils.parse_cfg import parse_env_cfg
          def _as_np(x):
              if isinstance(x, wp.array): return wp.to_torch(x).detach().cpu().numpy()
              if isinstance(x, torch.Tensor): return x.detach().cpu().numpy()
              return np.asarray(x)
          def _ser(o): return pickle.dumps(_cpu(o), protocol=pickle.HIGHEST_PROTOCOL)
          def _deser(b): return pickle.loads(b)
          def _cpu(o):
              if isinstance(o, (wp.array, torch.Tensor)): return _as_np(o)
              if isinstance(o, dict): return {k: _cpu(v) for k, v in o.items()}
              if isinstance(o, (list, tuple)): return type(o)(_cpu(v) for v in o)
              return o
          def make_env(task):
              cfg = parse_env_cfg(task, device="cuda:0", num_envs=1); cfg.scene.num_envs = 1
              return gym.make(task, cfg=cfg, render_mode=None)
          def render_frame(env):
              try:
                  cam = env.unwrapped.scene.sensors.get("camera")
                  if cam is None or cam.data is None or cam.data.output is None: return None
                  rgb = cam.data.output.get("rgb")
                  if rgb is None: return None
                  rgb = rgb.cpu().numpy() if hasattr(rgb,"cpu") else np.asarray(rgb)
                  if rgb.ndim == 4: return rgb[0,...,:3].astype(np.uint8)
                  if rgb.ndim == 3: return rgb[...,:3].astype(np.uint8)
              except Exception as e: print(f"[SIM] render warn: {e}", flush=True)
              return None
          def extract_proprio(obs, env):
              try:
                  r = env.unwrapped.scene["robot"]
                  pose = r.data.root_pos_w[0].detach().cpu().numpy()
                  quat = r.data.root_quat_w[0].detach().cpu().numpy()
                  lin  = r.data.root_lin_vel_w[0].detach().cpu().numpy()
                  w,x,y,z = quat
                  yaw = float(np.arctan2(2*(w*z + x*y), 1 - 2*(y*y + z*z)))
                  return np.array([float(pose[0]),float(pose[1]),yaw,float(np.linalg.norm(lin[:2]))], dtype=np.float32)
              except Exception: return np.zeros(4, dtype=np.float32)
          _q = queue.Queue()
          class SimServer:
              def __init__(self, env):
                  self.env = env; self._episode = 0
                  # ROBUST: introspect action_manager to discover drive/steer
                  # joint index ranges. Used to expand GR00T's 3-D output.
                  self._action_layout = self._discover_action_layout(env)
                  print(f"[SIM] action layout: {self._action_layout}", flush=True)
              def _discover_action_layout(self, env):
                  try:
                      am = env.unwrapped.action_manager
                      total = int(am.total_action_dim)
                      drive_idx = []; steer_idx = []
                      offset = 0
                      for term_name in am.active_terms:
                          term = am.get_term(term_name)
                          dim = int(getattr(term, "action_dim", 0) or 0)
                          rng = list(range(offset, offset + dim))
                          if "drive" in term_name.lower() or "wheel" in term_name.lower():
                              drive_idx.extend(rng)
                          elif "steer" in term_name.lower() or "rotator" in term_name.lower():
                              steer_idx.extend(rng)
                          offset += dim
                      return {"total_dim": total,
                              "drive_indices": drive_idx,
                              "steer_indices": steer_idx}
                  except Exception as e:
                      print(f"[SIM] action layout discovery failed: {e}", flush=True)
                      return None
              def _disp(self, op, pl=None):
                  ev = threading.Event(); h = [None,None]; _q.put((op,pl,ev,h)); ev.wait(timeout=60)
                  if h[1] is not None: raise h[1]
                  return h[0]
              def Reset(self,r,c):  return self._disp("reset")
              def Step(self,r,c):   return self._disp("step", _deser(r)["action"])
              def Health(self,r,c): return _ser({"ok":True})
              def Close(self,r,c):  return self._disp("close")
              def GetActionLayout(self,r,c): return _ser(self._action_layout or {})
          def process(srv, op, pl):
              env = srv.env
              if op == "reset":
                  obs = env.reset(); obs = obs[0] if isinstance(obs,tuple) else obs
                  srv._episode += 1
                  return _ser({"proprio":extract_proprio(obs,env), "frame":render_frame(env), "episode":srv._episode})
              if op == "step":
                  a = pl
                  if isinstance(a, np.ndarray): a = torch.from_numpy(a).float().to("cuda:0")
                  if a.dim() == 1: a = a.unsqueeze(0)
                  # ROBUST: expand GR00T [steer, throttle, brake] into the env's
                  # full action vector. Layout discovered from action_manager.
                  layout = getattr(srv, "_action_layout", None)
                  if layout is not None and a.shape[-1] == 3 and layout.get("total_dim"):
                      steer = a[..., 0:1]; throttle = a[..., 1:2]; brake = a[..., 2:3]
                      forward = throttle - brake
                      expanded = torch.zeros(a.shape[0], layout["total_dim"],
                                             device=a.device, dtype=a.dtype)
                      for i in layout.get("drive_indices", []): expanded[:, i] = forward.squeeze(-1)
                      for i in layout.get("steer_indices", []): expanded[:, i] = steer.squeeze(-1)
                      a = expanded
                  else:
                      try:
                          need = env.action_space.shape[-1]; have = int(a.shape[-1])
                          if have != need:
                              if have > need: a = a[..., :need]
                              else: a = torch.cat([a, torch.zeros(*a.shape[:-1], need - have,
                                                                  device=a.device, dtype=a.dtype)], dim=-1)
                      except Exception: pass
                  out = env.step(a)
                  if len(out) == 5: obs,r,term,trunc,_ = out
                  else: obs,r,done,_ = out; term,trunc = bool(done), False
                  try:
                      goal = env.unwrapped.scene["goal"].data.root_pos_w[0]
                      pos  = env.unwrapped.scene["robot"].data.root_pos_w[0]
                      dist = float(torch.linalg.norm(goal[:2]-pos[:2]))
                      success = dist < 0.5
                      if success: term = True
                  except Exception: dist = -1.0; success = False
                  return _ser({"proprio":extract_proprio(obs,env), "frame":render_frame(env),
                               "reward":float(_as_np(r)) if hasattr(r,"shape") else float(r),
                               "terminated":bool(_as_np(term)) if hasattr(term,"shape") else bool(term),
                               "truncated":bool(_as_np(trunc)) if hasattr(trunc,"shape") else bool(trunc),
                               "dist_to_goal":dist, "success":success})
              if op == "close":
                  try: env.close()
                  except Exception: pass
                  return _ser({"ok":True})
          def serve():
              env = make_env(os.environ.get("ISAAC_TASK","Isaac-Forklift-Nav-v0"))
              srv = SimServer(env)
              server = grpc.server(futures.ThreadPoolExecutor(max_workers=4),
                  options=[("grpc.max_receive_message_length", 256*1024*1024),
                           ("grpc.max_send_message_length",    256*1024*1024)])
              handlers = {m: grpc.unary_unary_rpc_method_handler(getattr(srv,m),
                              request_deserializer=lambda x:x, response_serializer=lambda x:x)
                          for m in ("Reset","Step","Health","Close","GetActionLayout")}
              server.add_generic_rpc_handlers((grpc.method_handlers_generic_handler("SimService", handlers),))
              port = os.environ.get("SIM_RPC_PORT","7000"); server.add_insecure_port(f"[::]:{port}")
              server.start(); print(f"[SIM] gRPC on :{port}", flush=True)
              try:
                  while simulation_app.is_running():
                      while not _q.empty():
                          try:
                              op,pl,ev,h = _q.get_nowait()
                              try: h[0] = process(srv,op,pl)
                              except Exception as e: h[1] = e
                              ev.set()
                          except queue.Empty: break
                      simulation_app.update()
              finally: server.stop(grace=5)
          if __name__ == "__main__": serve()
      - path: /scripts/vehicle_mapper.py
        contents: |
          """GR00T <-> sim adapter. 3-D control vector; sim_server pads/trims."""
          import numpy as np
          class VehicleMapper:
              def obs_to_groot(self, proprio, frame, task_desc):
                  p = np.asarray(proprio, dtype=np.float32).reshape(-1)
                  if p.size < 4: p = np.concatenate([p, np.zeros(4 - p.size, dtype=np.float32)])
                  else: p = p[:4]
                  if frame is None: frame = np.zeros((480, 640, 3), dtype=np.uint8)
                  frame = np.asarray(frame, dtype=np.uint8)
                  if frame.ndim == 3: frame = frame[np.newaxis, np.newaxis, ...]
                  return {"video": {"front_camera": frame},
                          "state": {"vehicle_state": p.reshape(1, 1, 4)},
                          "language": {"annotation.human.task_description": [[task_desc]]}}
              def action_chunk_from_groot(self, ga, current_proprio=None):
                  arr = None
                  for k in ("action.vehicle_control", "vehicle_control"):
                      if k in ga: arr = np.asarray(ga[k], dtype=np.float32); break
                  if arr is None: return [np.zeros(3, dtype=np.float32)]
                  if arr.ndim == 3: arr = arr[0]
                  out = []
                  for t in range(arr.shape[0]):
                      st = float(np.clip(arr[t, 0], -1.0, 1.0))
                      th = float(np.clip(arr[t, 1], 0.0, 1.0))
                      br = float(np.clip(arr[t, 2], 0.0, 1.0))
                      out.append(np.array([st, th, br], dtype=np.float32))
                  return out
      - path: /scripts/wait_for_sim.py
        contents: |
          import os, time, grpc, pickle
          ser = lambda x: pickle.dumps(x, protocol=pickle.HIGHEST_PROTOCOL)
          deser = lambda x: pickle.loads(x)
          addr = os.environ.get("SIM_RPC_ADDR", f"127.0.0.1:{os.environ.get('SIM_RPC_PORT','7000')}")
          ch = grpc.insecure_channel(addr)
          health = ch.unary_unary("/SimService/Health", request_serializer=ser, response_deserializer=deser)
          for i in range(1800):
              try:
                  if health({}).get("ok"): print(f"[wait] sim ready after {i+1}s", flush=True); break
              except Exception: pass
              time.sleep(1)
          else: raise RuntimeError("sim RPC not ready after 1800s")
      - path: /scripts/install_flash_attn_stub.py
        contents: |
          """SDPA stub for environments without flash-attn (eval policy venv)."""
          import os, sys
          site = next((p for p in sys.path if p.endswith("site-packages") and "groot-venv" in p), None)
          if site is None:
              site = next(p for p in sys.path if p.endswith("site-packages"))
          stub = os.path.join(site, "flash_attn"); os.makedirs(stub, exist_ok=True)
          di = os.path.join(site, "flash_attn-2.6.3.dist-info"); os.makedirs(di, exist_ok=True)
          for fn, body in [("METADATA","Metadata-Version: 2.1\nName: flash-attn\nVersion: 2.6.3\n"),
                           ("RECORD",""), ("INSTALLER","pip"), ("top_level.txt","flash_attn\n")]:
              open(os.path.join(di, fn), "w").write(body)
          open(os.path.join(stub, "__init__.py"), "w").write("""
          __version__ = '2.6.3'
          flash_attn_version = '2.6.3'
          import torch, torch.nn.functional as F
          def flash_attn_func(q, k, v, dropout_p=0.0, softmax_scale=None, causal=False, window_size=(-1,-1), **kw):
              if softmax_scale is None: softmax_scale = q.shape[-1] ** -0.5
              if q.dim() == 4: q,k,v = q.transpose(1,2), k.transpose(1,2), v.transpose(1,2)
              o = F.scaled_dot_product_attention(q,k,v, is_causal=causal, dropout_p=dropout_p, scale=softmax_scale)
              return o.transpose(1,2) if o.dim()==4 else o
          def flash_attn_varlen_func(q, k, v, cu_seqlens_q=None, cu_seqlens_k=None,
                                     max_seqlen_q=None, max_seqlen_k=None,
                                     dropout_p=0.0, softmax_scale=None, causal=False, **kw):
              cu_q = cu_seqlens_q if cu_seqlens_q is not None else kw.get("cu_q")
              cu_k = cu_seqlens_k if cu_seqlens_k is not None else kw.get("cu_k")
              if softmax_scale is None: softmax_scale = q.shape[-1] ** -0.5
              outs = []
              for i in range(len(cu_q)-1):
                  sq,eq = int(cu_q[i]), int(cu_q[i+1])
                  sk,ek = int(cu_k[i]), int(cu_k[i+1])
                  qi = q[sq:eq].unsqueeze(0).transpose(1,2)
                  ki = k[sk:ek].unsqueeze(0).transpose(1,2)
                  vi = v[sk:ek].unsqueeze(0).transpose(1,2)
                  outs.append(F.scaled_dot_product_attention(qi,ki,vi,is_causal=causal,
                      dropout_p=dropout_p, scale=softmax_scale).transpose(1,2).squeeze(0))
              return torch.cat(outs, dim=0)
          def flash_attn_varlen_qkvpacked_func(qkv, cu_seqlens=None, max_seqlen=None,
                                                dropout_p=0.0, softmax_scale=None, causal=False, **kw):
              cu = cu_seqlens if cu_seqlens is not None else kw.get("cu")
              q,k,v = qkv.unbind(dim=2)
              return flash_attn_varlen_func(q,k,v, cu_seqlens_q=cu, cu_seqlens_k=cu,
                                            max_seqlen_q=max_seqlen, max_seqlen_k=max_seqlen,
                                            dropout_p=dropout_p, softmax_scale=softmax_scale, causal=causal)
          """)
          bp = os.path.join(stub,"bert_padding"); os.makedirs(bp, exist_ok=True)
          open(os.path.join(bp,"__init__.py"),"w").write("""
          import torch
          def index_first_axis(h, idx): return h[idx]
          def pad_input(h, idx, B, S):
              o = torch.zeros(B, S, *h.shape[1:], device=h.device, dtype=h.dtype)
              o.view(-1, *h.shape[1:])[idx] = h
              return o
          def unpad_input(h, mask):
              seqlens = mask.sum(-1, dtype=torch.int32)
              idx = torch.nonzero(mask.flatten(), as_tuple=False).flatten()
              ms = int(seqlens.max())
              cs = torch.cat([torch.zeros(1, dtype=torch.int32, device=seqlens.device),
                              seqlens.cumsum(0, dtype=torch.int32)])
              return h.view(-1, *h.shape[2:])[idx], idx, cs, ms
          """)
          ly = os.path.join(stub,"layers"); os.makedirs(ly, exist_ok=True)
          open(os.path.join(ly,"__init__.py"),"w").write("")
          open(os.path.join(ly,"rotary.py"),"w").write("""
          import torch
          def apply_rotary_emb(x, cos, sin, interleaved=False, inplace=False, conjugate=False):
              cos = cos.to(x.dtype); sin = sin.to(x.dtype)
              if cos.dim() == 2: cos = cos.unsqueeze(0).unsqueeze(0); sin = sin.unsqueeze(0).unsqueeze(0)
              d = x.shape[-1] // 2
              x1, x2 = x[..., :d], x[..., d:]
              return torch.cat([x1*cos[..., :d] - x2*sin[..., :d],
                                x2*cos[..., :d] + x1*sin[..., :d]], dim=-1)
          """)
          print("[stub] flash_attn SDPA stub at", stub)
      - path: /scripts/patch_eagle_for_sdpa.py
        contents: |
          """Aggressively patch flash_attention_2 references across the entire GR00T tree.

          The earlier targeted patch missed Qwen3-specific assertions outside
          gr00t/model/modules/ — verified in eval-smoke-1 with error
          "Qwen3 must use flash_attention_2 but got flash_attention_2".
          """
          import os, re
          for root, _, files in os.walk("/workspace/Isaac-GR00T"):
              for fn in files:
                  if not fn.endswith(".py"): continue
                  p = os.path.join(root, fn)
                  try:
                      c = open(p).read()
                  except Exception:
                      continue
                  c0 = c
                  if "flash_attention_2" not in c: continue
                  # Replace string-literal values (config slots that hold the impl name)
                  c = c.replace("'flash_attention_2'","'eager'").replace('"flash_attention_2"','"eager"')
                  # Neutralize any `assert ... flash_attention_2 ...` line
                  c = re.sub(r"^(\s*)assert\s+.*flash_attention_2.*$",
                             r"\1pass  # PATCHED: flash_attention_2 -> eager",
                             c, flags=re.MULTILINE)
                  if c != c0:
                      open(p,"w").write(c); print("[patch]", p, flush=True)
